<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTU Exam Review Hub | Live Exam Polls</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-sporty { font-family: 'Orbitron', sans-serif; letter-spacing: 0.05em; }

        .bg-mesh {
            background-color: #f8fafc;
            background-image: radial-gradient(at 40% 20%, hsla(228,100%,74%,0.15) 0px, transparent 50%),
                              radial-gradient(at 80% 0%, hsla(189,100%,56%,0.15) 0px, transparent 50%),
                              radial-gradient(at 0% 50%, hsla(228,100%,74%,0.15) 0px, transparent 50%);
        }
        
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-pulse-soft { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        /* Smooth Entry Animation */
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-mesh text-slate-800 antialiased flex flex-col min-h-screen relative overflow-x-hidden">

    <div id="navigation-container" class="min-h-[73px] w-full"></div>

    <main class="flex-grow w-full pb-20">
        
        <div class="w-full max-w-4xl mx-auto px-4 pt-10 pb-8 text-center relative z-20">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-slate-800 text-white text-xs font-bold uppercase tracking-wider mb-6 shadow-sm">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-rose-500"></span>
                </span>
                Live
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight leading-tight mb-4">
                Exam <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-rose-500">Review Hub</span>
            </h1>
            <p class="text-slate-500 font-medium md:text-lg max-w-2xl mx-auto">
                Vote anonymously on today's papers. Polls auto-lock 24 hours after the exam ends.
            </p>
        </div>

        <div class="w-full max-w-3xl mx-auto px-4 relative z-20" id="polls-wrapper">
            <div id="loading-state" class="text-center py-12">
                <i class="fas fa-spinner fa-spin text-3xl text-indigo-500 mb-4"></i>
                <p class="text-slate-500 font-bold">Syncing with Live Database...</p>
            </div>
        </div>

    </main>

    <script src="components.js"></script>
    <script src="poll-config.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
        
        try {
            // Firebase Configuration
            const firebaseConfig = {
                apiKey: "AIzaSyCQQdEQPqHebt9QCDzWIvZdRUk0g-2dCLs",
                authDomain: "kerala-timetable-db.firebaseapp.com",
                databaseURL: "https://kerala-timetable-db-default-rtdb.asia-southeast1.firebasedatabase.app",
                projectId: "kerala-timetable-db",
                storageBucket: "kerala-timetable-db.firebasestorage.app",
                messagingSenderId: "527439836518",
                appId: "1:527439836518:web:af7725a5bf07d6a4f584a7"
            };

            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);

            // Fetch active polls from your poll-config.js file
            const myPolls = window.examPollConfig;
            
            if (!myPolls) {
                throw new Error("poll-config.js could not be read. Ensure the file is linked correctly.");
            }

            // Global Voting Function
            window.submitVote = function(pollId, category) {
                localStorage.setItem('voted_' + pollId, true); // Prevent double voting
                
                // Show loading spinner on the card
                document.getElementById('action-area-' + pollId).innerHTML = `
                    <div class="py-8 flex flex-col items-center justify-center">
                        <i class="fas fa-spinner fa-spin text-3xl text-indigo-500 mb-3"></i>
                        <p class="font-bold text-slate-600">Registering Anonymous Vote...</p>
                    </div>
                `;

                // Push vote to Firebase safely
                const voteRef = ref(db, 'polls/' + pollId + '/' + category);
                runTransaction(voteRef, (currentVotes) => {
                    return (currentVotes || 0) + 1;
                }).then(() => {
                    renderResultsUI(pollId, false); // Swap to the live bar chart
                }).catch((error) => {
                    console.error("Firebase Error:", error);
                    alert("Database write error. Please try again.");
                });
            };

            // Main UI Initialization
            function initPolls() {
                const wrapper = document.getElementById('polls-wrapper');
                wrapper.innerHTML = '';
                const now = new Date();

                // AUTO-SORTING LOGIC: Priority: 1. Live Now -> 2. Upcoming -> 3. Closed
                const sortedPolls = myPolls.sort((a, b) => {
                    const openA = new Date(a.opensAt);
                    const closeA = new Date(a.closesAt);
                    const isLiveA = now >= openA && now <= closeA;
                    const isUpcomingA = now < openA;

                    const openB = new Date(b.opensAt);
                    const closeB = new Date(b.closesAt);
                    const isLiveB = now >= openB && now <= closeB;
                    const isUpcomingB = now < openB;

                    let rankA = 3; 
                    if (isLiveA) rankA = 1;
                    else if (isUpcomingA) rankA = 2;

                    let rankB = 3; 
                    if (isLiveB) rankB = 1;
                    else if (isUpcomingB) rankB = 2;

                    if (rankA === rankB) {
                         return openA - openB; 
                    }
                    return rankA - rankB;
                });

                // Render the sorted array
                sortedPolls.forEach((poll, index) => {
                    const openTime = new Date(poll.opensAt);
                    const closeTime = new Date(poll.closesAt);
                    
                    const isUpcoming = now < openTime;
                    const isOpen = now >= openTime && now <= closeTime;
                    const isClosed = now > closeTime;
                    const hasVoted = localStorage.getItem('voted_' + poll.id);

                    // --- 1. BUILD THE MAIN POLL CARD ---
                    const pollCard = document.createElement('div');
                    pollCard.className = "bg-white/70 backdrop-blur-xl border border-white shadow-[0_20px_50px_rgba(79,70,229,0.08)] rounded-3xl p-6 md:p-8 animate-fade-in-up";
                    pollCard.style.opacity = "0"; // Start hidden for animation
                    pollCard.style.animationDelay = `${index * 0.15}s`; // Stagger the entry
                    
                    let statusHtml = '';
                    if (isUpcoming) {
                        statusHtml = '<div class="flex items-center gap-2 text-indigo-500 text-xs font-bold uppercase tracking-widest"><i class="fas fa-calendar-alt text-[10px]"></i> Upcoming</div>';
                    } else if (isOpen) {
                        statusHtml = '<div class="flex items-center gap-2 text-rose-500 text-xs font-bold uppercase tracking-widest animate-pulse-soft"><i class="fas fa-circle text-[8px]"></i> Live Now</div>';
                    } else {
                        statusHtml = '<div class="flex items-center gap-2 text-slate-400 text-xs font-bold uppercase tracking-widest"><i class="fas fa-lock text-[10px]"></i> Poll Closed</div>';
                    }

                    // Generate Tags HTML (e.g. [CSE] [S1])
                    let tagsHtml = '';
                    if (poll.tags && Array.isArray(poll.tags)) {
                        poll.tags.forEach((tag, tagIndex) => {
                            let colorClass = tagIndex === 0 
                                ? "bg-indigo-50 border-indigo-200 text-indigo-600" 
                                : "bg-slate-100 border-slate-200 text-slate-600";
                            tagsHtml += `<span class="inline-block px-2.5 py-1 border ${colorClass} text-[10px] font-sporty rounded-md">${tag}</span>`;
                        });
                    }

                    // Card Header 
                    let html = `
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <div class="flex flex-wrap gap-2 mb-3">
                                    ${tagsHtml}
                                </div>
                                <h2 class="text-xl md:text-2xl font-black text-slate-800 tracking-tight leading-tight pr-4">${poll.subjectName}</h2>
                            </div>
                            ${statusHtml}
                        </div>
                        <div id="content-area-${poll.id}"></div>
                    `;
                    
                    pollCard.innerHTML = html;
                    
                    // Container to hold BOTH the poll card AND the external WhatsApp banner
                    const groupContainer = document.createElement('div');
                    groupContainer.className = "mb-10"; // Increased margin to space out entire blocks
                    groupContainer.appendChild(pollCard);

                    // --- 2. BUILD THE EXTERNAL WHATSAPP BANNER (IF LIVE) ---
                    if (isOpen) {
                    const whatsappBanner = document.createElement('div');
                    whatsappBanner.className = "mt-3 animate-fade-in-up";
                    whatsappBanner.style.opacity = "0";
                     whatsappBanner.style.animationDelay = `${(index * 0.15) + 0.1}s`; // Slightly after the card
    
              whatsappBanner.innerHTML = `
                 <a href="https://whatsapp.com/channel/0029Vb7zhxw5vKABedfmht0D" target="_blank" class="w-full flex items-center justify-center gap-2 bg-white hover:bg-gray-50 text-[#355749] font-bold py-3 px-6 rounded-xl transition-all duration-300 transform hover:-translate-y-1 shadow-sm text-sm border border-[#355749]">
                 <i class="fab fa-whatsapp text-lg"></i>
                  Follow WhatsApp Channel for KTU Updates
                </a>
                 `;
                    groupContainer.appendChild(whatsappBanner);
                   }


                    // --- 3. INJECT SPECIFIC UI CONTENT BASED ON TIMING ---
                    const contentArea = document.getElementById('content-area-' + poll.id);
                    
                    if (isUpcoming) {
                        // UPCOMING STATE
                        contentArea.innerHTML = `
                            <div class="bg-indigo-50/50 border border-indigo-100 rounded-2xl p-6 text-center">
                                <i class="fas fa-hourglass-half text-3xl text-indigo-400 mb-3"></i>
                                <h3 class="text-sm font-black text-indigo-900 uppercase tracking-widest mb-1">Poll Opens Soon</h3>
                                <p class="text-xs text-indigo-600/80 font-medium">Check back when the exam ends to cast your vote.</p>
                            </div>
                        `;
                        startCountdown(openTime, contentArea, "Opens in");
                    } else if (isOpen && !hasVoted) {
                        // LIVE VOTING STATE
                        contentArea.innerHTML = `
                            <div id="action-area-${poll.id}" class="bg-slate-50 border border-slate-200 rounded-2xl p-5 md:p-6">
                                <div class="text-center mb-5">
                                    <h3 class="text-sm font-black text-slate-700 uppercase tracking-widest mb-1">How was the paper?</h3>
                                    <div class="inline-flex items-center gap-1.5 px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-bold mt-1 shadow-sm">
                                        <i class="fas fa-user-secret"></i> 100% Anonymous
                                    </div>
                                </div>
                                
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    <button onclick="submitVote('${poll.id}', 'easy')" class="flex flex-col items-center justify-center p-4 bg-white border border-slate-200 hover:border-emerald-500 hover:bg-emerald-50 rounded-xl transition-all shadow-sm group">
                                        <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">😊</span>
                                        <span class="font-bold text-xs text-slate-700 group-hover:text-emerald-600">Easy</span>
                                    </button>
                                    <button onclick="submitVote('${poll.id}', 'average')" class="flex flex-col items-center justify-center p-4 bg-white border border-slate-200 hover:border-indigo-500 hover:bg-indigo-50 rounded-xl transition-all shadow-sm group">
                                        <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">😐</span>
                                        <span class="font-bold text-xs text-slate-700 group-hover:text-indigo-600">Average</span>
                                    </button>
                                    <button onclick="submitVote('${poll.id}', 'hard')" class="flex flex-col items-center justify-center p-4 bg-white border border-slate-200 hover:border-orange-500 hover:bg-orange-50 rounded-xl transition-all shadow-sm group">
                                        <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">😓</span>
                                        <span class="font-bold text-xs text-slate-700 group-hover:text-orange-600">Hard</span>
                                    </button>
                                    <button onclick="submitVote('${poll.id}', 'supply')" class="flex flex-col items-center justify-center p-4 bg-white border border-slate-200 hover:border-rose-500 hover:bg-rose-50 rounded-xl transition-all shadow-sm group">
                                        <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">💀</span>
                                        <span class="font-bold text-xs text-slate-700 group-hover:text-rose-600 text-center leading-tight">Supply Confirm</span>
                                    </button>
                                </div>
                            </div>
                        `;
                        startCountdown(closeTime, contentArea, "Auto-locks in");
                    } else {
                        // ALREADY VOTED OR CLOSED STATE
                        renderResultsUI(poll.id, isClosed);
                        if (isOpen) {
                            startCountdown(closeTime, contentArea, "Auto-locks in");
                        }
                    }
                });
                
                // Empty state
                if (myPolls.length === 0) {
                    wrapper.innerHTML = `
                        <div class="text-center py-16 bg-white/50 backdrop-blur-md rounded-3xl border border-slate-200 border-dashed animate-fade-in-up">
                            <i class="fas fa-folder-open text-4xl text-slate-300 mb-4"></i>
                            <h3 class="text-lg font-bold text-slate-600">No active polls right now</h3>
                            <p class="text-sm text-slate-400 mt-1">Check back after your next exam.</p>
                        </div>
                    `;
                }
            }

            // Results UI Generator
            function renderResultsUI(pollId, isClosed) {
                const contentArea = document.getElementById('content-area-' + pollId);
                contentArea.innerHTML = `
                    <div class="bg-slate-50 border border-slate-200 rounded-2xl p-6">
                        <div class="flex justify-between items-end mb-4 border-b border-slate-200 pb-2">
                            <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest">Live Distribution</h3>
                            <span id="total-votes-${pollId}" class="text-xs font-bold text-slate-500 font-sporty bg-white px-2 py-1 rounded shadow-sm">0 Votes</span>
                        </div>
                        <div id="charts-${pollId}" class="space-y-4">
                            <div class="text-center text-sm font-bold text-slate-400 py-4"><i class="fas fa-spinner fa-spin"></i> Fetching live data...</div>
                        </div>
                    </div>
                `;

                // Real-time Firebase Listener
                const pollRef = ref(db, 'polls/' + pollId);
                onValue(pollRef, (snapshot) => {
                    const data = snapshot.val() || { easy: 0, average: 0, hard: 0, supply: 0 };
                    const total = (data.easy || 0) + (data.average || 0) + (data.hard || 0) + (data.supply || 0);
                    
                    document.getElementById('total-votes-' + pollId).innerText = total + ' Votes';

                    if(total === 0) {
                        document.getElementById('charts-' + pollId).innerHTML = '<p class="text-sm font-bold text-slate-500 text-center py-4">No votes cast yet.</p>';
                        return;
                    }

                    const chartsDiv = document.getElementById('charts-' + pollId);
                    chartsDiv.innerHTML = '';

                    const generateBar = (label, value, colorHex, emoji) => {
                        const percentage = Math.round((value / total) * 100);
                        return `
                            <div>
                                <div class="flex justify-between text-xs font-bold mb-1">
                                    <span style="color: ${colorHex}">${label} ${emoji}</span>
                                    <span class="text-slate-600 font-sporty">${percentage}%</span>
                                </div>
                                <div class="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden">
                                    <div class="h-2.5 rounded-full transition-all duration-1000 ease-out" style="width: ${percentage}%; background-color: ${colorHex}"></div>
                                </div>
                            </div>
                        `;
                    };

                    chartsDiv.innerHTML += generateBar('Easy', data.easy || 0, '#10b981', '😊');
                    chartsDiv.innerHTML += generateBar('Average', data.average || 0, '#4f46e5', '😐');
                    chartsDiv.innerHTML += generateBar('Hard', data.hard || 0, '#f97316', '😓');
                    chartsDiv.innerHTML += generateBar('Supply Confirm', data.supply || 0, '#e11d48', '💀');

                    // 🌟 VERDICT CALCULATION LOGIC 🌟
                    let maxVotes = -1;
                    let isTie = false;
                    let verdictData = null;

                    const categories = [
                        { key: 'easy', label: 'Easy', color: 'text-emerald-600', emoji: '😊', bg: 'bg-emerald-50', border: 'border-emerald-200' },
                        { key: 'average', label: 'Average', color: 'text-indigo-600', emoji: '😐', bg: 'bg-indigo-50', border: 'border-indigo-200' },
                        { key: 'hard', label: 'Hard', color: 'text-orange-600', emoji: '😓', bg: 'bg-orange-50', border: 'border-orange-200' },
                        { key: 'supply', label: 'Supply Confirm', color: 'text-rose-600', emoji: '💀', bg: 'bg-rose-50', border: 'border-rose-200' }
                    ];

                    categories.forEach(cat => {
                        const votes = data[cat.key] || 0;
                        if (votes > maxVotes) {
                            maxVotes = votes;
                            verdictData = cat;
                            isTie = false;
                        } else if (votes === maxVotes && votes > 0) {
                            isTie = true;
                        }
                    });

                    // Only show Verdict banner if there are votes AND the poll is completely closed
                    if (total > 0 && isClosed) {
                        let verdictHtml = '';
                        let bannerLabel = "Final Verdict";
                        
                        if (isTie) {
                            verdictHtml = `
                                <div class="mt-5 pt-4 border-t border-slate-200">
                                    <div class="bg-slate-100 border border-slate-200 rounded-xl p-3 flex items-center justify-between opacity-90">
                                        <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">${bannerLabel}</span>
                                        <div class="text-sm font-black text-slate-600">Mixed Reactions 🤷‍♂️</div>
                                    </div>
                                </div>
                            `;
                        } else {
                            verdictHtml = `
                                <div class="mt-5 pt-4 border-t border-slate-200">
                                    <div class="${verdictData.bg} border ${verdictData.border} rounded-xl p-3 flex items-center justify-between">
                                        <span class="text-xs font-bold ${verdictData.color} uppercase tracking-widest">${bannerLabel}</span>
                                        <div class="text-sm font-black ${verdictData.color}">${verdictData.label} ${verdictData.emoji}</div>
                                    </div>
                                </div>
                            `;
                        }
                        chartsDiv.innerHTML += verdictHtml;
                    }
                });
            }

            // Enhanced Lock Timer (Handles Days Properly)
            function startCountdown(targetTime, container, prefixText) {
                const timerDiv = document.createElement('div');
                timerDiv.className = "text-center mt-4 text-xs font-bold text-slate-400 font-sporty flex justify-center items-center gap-2";
                container.appendChild(timerDiv);

                const interval = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = targetTime.getTime() - now;

                    if (distance < 0) {
                        clearInterval(interval);
                        initPolls(); // Auto-reload to switch states (Upcoming -> Live -> Closed)
                        return;
                    }

                    // Calculates Total Days
                    const d = Math.floor(distance / (1000 * 60 * 60 * 24));
                    const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((distance % (1000 * 60)) / 1000);

                    let timeString = d > 0 ? `${d}d ${h}h ${m}m ${s}s` : `${h}h ${m}m ${s}s`;

                    timerDiv.innerHTML = `<i class="fas fa-clock text-slate-300"></i> ${prefixText}: ${timeString}`;
                }, 1000);
            }

            // Execute
            if (typeof loadNavigation === 'function') {
                loadNavigation('', '', false);
            }
            initPolls();

        } catch (error) {
            console.error(error);
            document.getElementById('polls-wrapper').innerHTML = `
                <div class="text-center py-12 bg-rose-50 border border-rose-200 rounded-2xl animate-fade-in-up">
                    <i class="fas fa-exclamation-triangle text-4xl text-rose-500 mb-4"></i>
                    <h3 class="text-lg font-black text-rose-700 mb-2">System Error</h3>
                    <p class="text-sm font-medium text-rose-500 px-4">${error.message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
