        .animate-fade-up { opacity: 0; animation: fadeUpEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }

<body class="bg-mesh text-slate-800 antialiased flex flex-col min-h-screen relative overflow-x-hidden">

    <div id="navigation-container" class="min-h-[73px] w-full"></div>

    <main class="flex-grow w-full pb-20">

            <h1 class="animate-fade-up delay-100 text-4xl md:text-5xl font-black text-slate-900 tracking-tight leading-tight mb-4">

        <div class="w-full max-w-6xl mx-auto px-4 relative z-20">
            
            <div id="ongoing-section" class="animate-fade-up delay-300 mb-12 hidden">
                <div class="flex items-center gap-3 mb-5 border-b border-rose-200/50 pb-3">
                    <span class="relative flex h-3.5 w-3.5">

                <div class="flex items-center gap-3 mb-5 border-b border-amber-200/50 pb-3">
                    <i class="fas fa-hourglass-half text-amber-500 text-xl"></i>
                    <h2 class="text-2xl font-black text-slate-900 tracking-tight">Upcoming Exams</h2>
                </div>
                <div id="upcoming-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">

            <div class="animate-fade-up delay-300">
                <div class="flex items-center justify-between gap-3 mb-6">

                <div class="flex overflow-x-auto no-scrollbar gap-2 mb-8 pb-2 border-b border-slate-200/60 w-full" id="filter-tabs">

    <div id="push-notification-banner" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 translate-y-[200%] transition-transform duration-700 ease-out z-[100] w-[95%] max-w-2xl bg-slate-900/95 backdrop-blur-xl text-white p-4 md:p-5 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.4)] border border-slate-700/50 flex flex-col md:flex-row items-center justify-between gap-4 md:gap-6">
        <div class="flex items-center gap-4 w-full md:w-auto">
            <div class="bg-indigo-500/20 p-3 rounded-2xl border border-indigo-500/30 flex-shrink-0" id="push-icon-container">
                <i class="fas fa-bell text-2xl text-indigo-400 animate-bounce" id="push-icon"></i>
            </div>
            <div>
                <h4 class="font-black text-base md:text-lg tracking-tight text-white mb-0.5" id="push-title">KTU Instant Alerts</h4>
                <p class="text-xs text-slate-400 font-medium leading-snug" id="push-desc">Get notified the second a new timetable or exam notice drops.</p>
            </div>
        </div>
        <div class="flex gap-2.5 w-full md:w-auto flex-shrink-0" id="push-buttons">
            <button onclick="dismissPushBanner()" class="flex-1 md:flex-none px-4 py-2.5 text-xs font-bold text-slate-300 hover:text-white transition-colors rounded-xl border border-slate-700 hover:bg-slate-800">Not Now</button>
            <button onclick="enablePushNotifications()" class="flex-1 md:flex-none px-5 py-2.5 bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-400 hover:to-indigo-500 text-white text-xs font-black uppercase tracking-wider rounded-xl shadow-lg shadow-indigo-500/30 transition-transform hover:scale-105">Turn On</button>
        </div>
    </div>

    <script src="components.js?v=12"></script>
    <script src="timetable-config.js"></script>

    <script>
        loadNavigation('timetable', '', false);

        // Fetch data from external config
        const timetablesData = window.timetablesData || [];

        // --- STYLING LOGIC FOR SEMESTER BADGES ---
        function getSemesterStyles(semesterStr) {
            const sem = semesterStr.toUpperCase();
            if (sem.includes('S1') || sem.includes('S2')) return { bg: 'bg-indigo-100', text: 'text-indigo-700', border: 'border-indigo-200' };
            if (sem.includes('S3') || sem.includes('S4')) return { bg: 'bg-emerald-100', text: 'text-emerald-700', border: 'border-emerald-200' };
            if (sem.includes('S5') || sem.includes('S6')) return { bg: 'bg-amber-100', text: 'text-amber-700', border: 'border-amber-200' };
            if (sem.includes('S7') || sem.includes('S8')) return { bg: 'bg-rose-100', text: 'text-rose-700', border: 'border-rose-200' };
            return { bg: 'bg-slate-100', text: 'text-slate-700', border: 'border-slate-200' };
        }

        // --- HTML CARD GENERATOR ---
        function generateCardHTML(item, statusText = '', isCountdown = false) {
            const styles = getSemesterStyles(item.semester);
            const startObj = new Date(item.startDate);
            const endObj = new Date(item.endDate);
            
            const dateOptions = { month: 'short', day: 'numeric' };
            const dateString = `${startObj.toLocaleDateString('en-US', dateOptions)} - ${endObj.toLocaleDateString('en-US', dateOptions)}`;

            let statusHTML = '';
            if (statusText === 'LIVE') {
                statusHTML = `<div class="w-full bg-rose-500 border-t border-rose-600 p-3 text-center text-[15px] font-sporty text-white tracking-widest shadow-[0_-4px_15px_rgba(244,63,94,0.3)] z-10"><i class="fas fa-circle text-[10px] animate-pulse mr-1.5"></i> Ongoing Now</div>`;
            } else if (isCountdown) {
                statusHTML = `<div class="w-full bg-amber-50 border-t border-amber-200 p-3.5 text-center z-10"><div class="text-[10px] font-bold text-amber-700 uppercase tracking-widest mb-1">Starts In</div><div class="countdown-target font-sporty text-amber-600 text-xl md:text-2xl tracking-wider drop-shadow-sm" data-date="${item.startDate}">00:00:00:00</div></div>`;
            } else if (statusText === 'PAST') {
                statusHTML = `<div class="w-full bg-slate-100 border-t border-slate-200 p-3 text-center text-xs font-bold text-slate-500 uppercase tracking-widest z-10">Exam Completed</div>`;
            }

            return `
                <div class="timetable-card bg-white/90 backdrop-blur-md rounded-2xl border border-slate-200 shadow-sm flex flex-col relative overflow-hidden h-full group" data-category="${item.categoryBadge}">
                    
                    <div class="absolute top-1 right-2 text-7xl font-black text-slate-900 opacity-20 pointer-events-none select-none z-0 leading-none">
                        ${item.semester}
                    </div>

                    <div class="p-5 flex-grow relative z-10 flex flex-col">
                        <div class="flex items-center gap-2 mb-8">
                            <span class="px-2.5 py-1 rounded-md text-[10px] font-black uppercase tracking-wider border ${styles.bg} ${styles.text} ${styles.border}">${item.semester}</span>
                            <span class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider bg-slate-100 text-slate-600 border border-slate-200">${item.type}</span>
                        </div>
                        
                        <h3 class="text-lg font-extrabold text-slate-800 leading-tight mb-2 line-clamp-2 pr-4" title="${item.title}">${item.title}</h3>
                        
                        <div class="flex items-center gap-2 text-xs font-semibold text-slate-400 mb-4">
                            <i class="fas fa-book text-slate-300"></i> ${item.scheme}
                        </div>
                        
                        <div class="mt-auto pt-4 border-t border-slate-100/60">
                            <div class="flex items-center text-sm font-bold text-slate-600 mb-4">
                                <i class="fas fa-calendar-alt text-indigo-400 mr-2"></i> ${dateString}
                            </div>
                            
                            <div class="flex items-center gap-2">
                                <a href="${item.viewLink}" class="flex-grow bg-slate-800 hover:bg-indigo-600 text-white text-center font-bold py-2.5 px-4 rounded-xl transition-colors text-sm shadow-sm">
                                    View Details
                                </a>
                                <a href="${item.pdfLink}" target="_blank" class="flex-shrink-0 w-11 h-11 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 flex items-center justify-center rounded-xl border border-indigo-100 transition-colors" title="Download PDF">
                                    <i class="fas fa-file-pdf"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                    
                    ${statusHTML}
                </div>
            `;
        }

        // --- DASHBOARD ENGINE (Sorting & Rendering) ---
        function renderDashboard() {
            if (!timetablesData || timetablesData.length === 0) {
                document.getElementById('empty-state').style.display = 'block';
                return;
            }

            const now = new Date();
            const ongoingGrid = document.getElementById('ongoing-grid');
            const upcomingGrid = document.getElementById('upcoming-grid');
            const vaultGrid = document.getElementById('vault-grid');
            
            let hasOngoing = false;
            let hasUpcoming = false;

            ongoingGrid.innerHTML = '';
            upcomingGrid.innerHTML = '';
            vaultGrid.innerHTML = '';

            const sortedData = [...timetablesData].sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

            sortedData.forEach(item => {
                const start = new Date(item.startDate);
                const end = new Date(item.endDate);
                
                if (now >= start && now <= end) {
                    ongoingGrid.innerHTML += generateCardHTML(item, 'LIVE', false);
                    vaultGrid.innerHTML += generateCardHTML(item, 'LIVE', false); 
                    hasOngoing = true;
                } 
                else if (now < start) {
                    upcomingGrid.innerHTML += generateCardHTML(item, '', true);
                    vaultGrid.innerHTML += generateCardHTML(item, '', true); 
                    hasUpcoming = true;
                } 
                else {
                    vaultGrid.innerHTML += generateCardHTML(item, 'PAST', false);
                }
            });

            document.getElementById('ongoing-section').style.display = hasOngoing ? 'block' : 'none';
            document.getElementById('upcoming-section').style.display = hasUpcoming ? 'block' : 'none';

            applyFilter('S1/S2'); // Fixed initial load filter
        }

        // --- SMART FILTER PILL LOGIC ---
        function applyFilter(filterValue) {
            const cards = document.getElementById('vault-grid').children;
            const emptyState = document.getElementById('empty-state');
            let visibleCount = 0;

            // Split the filter value (e.g. "S1" or "S1/S2") into an array of individual semesters
            const targetSemesters = filterValue.split('/').map(s => s.trim().toUpperCase());

            for (let i = 0; i < cards.length; i++) {
                const card = cards[i];
                // Get the card's category and make sure we have a clean string to compare against
                const cardCategoryStr = (card.getAttribute('data-category') || "").toUpperCase();
                
                // Check if ANY of the target semesters exist within the card's category string
                const isMatch = targetSemesters.some(sem => cardCategoryStr.includes(sem));

                if (isMatch) {
                    card.style.display = 'flex'; 
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            }
            emptyState.style.display = visibleCount === 0 ? 'block' : 'none';
        }

        function setupFilters() {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => {
                        b.classList.remove('bg-slate-800', 'text-white');
                        b.classList.add('bg-white', 'text-slate-500');
                    });
                    btn.classList.remove('bg-white', 'text-slate-500');
                    btn.classList.add('bg-slate-800', 'text-white');
                    applyFilter(btn.getAttribute('data-filter'));
                });
            });
        }

        // --- COUNTDOWN TIMER LOGIC ---
        function updateCountdowns() {
            const timers = document.querySelectorAll('.countdown-target');
            const now = new Date().getTime();

            timers.forEach(timer => {
                const targetDate = new Date(timer.getAttribute('data-date')).getTime();
                const distance = targetDate - now;

                if (distance < 0) {
                    timer.innerHTML = "STARTED";
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                timer.innerHTML = `${days}d : ${hours.toString().padStart(2, '0')}h : ${minutes.toString().padStart(2, '0')}m : ${seconds.toString().padStart(2, '0')}s`;
            });
        }

        // --- LIVE CLOCK TICKER ---
        function updateLiveClock() {
            const clockEl = document.getElementById('live-clock');
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            clockEl.innerHTML = `System Time: ${now.toLocaleDateString('en-IN', options)}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderDashboard();
            setupFilters();
            updateLiveClock();
            updateCountdowns();
            setInterval(updateCountdowns, 1000); 
            setInterval(updateLiveClock, 1000);
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCQQdEQPqHebt9QCDzWIvZdRUk0g-2dCLs",
            authDomain: "kerala-timetable-db.firebaseapp.com",
            databaseURL: "https://kerala-timetable-db-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kerala-timetable-db",
            storageBucket: "kerala-timetable-db.firebasestorage.app",
            messagingSenderId: "527439836518",
            appId: "1:527439836518:web:af7725a5bf07d6a4f584a7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let messaging;
        try {
            messaging = getMessaging(app);
        } catch (e) {
            console.log("Push messaging is not supported in this browser environment.", e);
        }

        const VAPID_KEY = "BCXy6JKM4MiYTvrHVYo5eJ1aj2vBwYUtDybZ6HUL_n0VpQhF8bHEY6XlrFidLLJBLyQ_FtJ6LyFGTYfr6WAwLZU";

        // Auto-show banner after 4 seconds if not already answered
        setTimeout(() => {
            if (!localStorage.getItem('push_prompted') && Notification.permission !== 'denied' && Notification.permission !== 'granted') {
                const banner = document.getElementById('push-notification-banner');
                if(banner) {
                    banner.classList.remove('translate-y-[200%]'); // Slides up smoothly
                }
            }
        }, 4000);

        // Hide banner
        window.dismissPushBanner = function() {
            document.getElementById('push-notification-banner').classList.add('translate-y-[200%]');
            localStorage.setItem('push_prompted', 'dismissed'); 
        }

        // Request permission and save token
        window.enablePushNotifications = async function() {
            try {
                if (!messaging) throw new Error("Messaging not supported");
                
                // Native browser prompt
                const permission = await Notification.requestPermission();
                
                if (permission === 'granted') {
                    console.log("Permission granted. Registering Service Worker manually...");
                    
                    // 1. MANUALLY REGISTER THE SERVICE WORKER
                    const registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
                    console.log("Service Worker registered successfully:", registration);
                    
                    // Wait for the service worker to become fully active!
                    await navigator.serviceWorker.ready;
                    
                    // 2. PASS THE REGISTRATION TO FIREBASE
                    const token = await getToken(messaging, { 
                        vapidKey: VAPID_KEY,
                        serviceWorkerRegistration: registration // This forces Firebase to use our file
                    });
                    
                    if (token) {
                        console.log("Token generated!", token);
                        
                        // Securely save to Firebase Realtime DB
                        const tokenRef = ref(db, 'subscribers/' + token);
                        await set(tokenRef, {
                            joinedAt: new Date().toISOString(),
                            platform: navigator.platform
                        });
                        
                        localStorage.setItem('push_prompted', 'subscribed');
                        
                        // Beautiful Success UI Transition
                        document.getElementById('push-buttons').style.display = 'none';
                        
                        const iconContainer = document.getElementById('push-icon-container');
                        iconContainer.className = "bg-emerald-500/20 p-3 rounded-2xl border border-emerald-500/30 flex-shrink-0";
                        
                        const icon = document.getElementById('push-icon');
                        icon.className = "fas fa-check-circle text-2xl text-emerald-400";
                        
                        document.getElementById('push-title').innerText = "You're All Set!";
                        document.getElementById('push-desc').innerText = "We'll notify you instantly when new updates drop.";
                        
                        // Wait 3 seconds, then slide away
                        setTimeout(() => {
                            document.getElementById('push-notification-banner').classList.add('translate-y-[200%]');
                        }, 3000);
                    }
                } else {
                    console.log("User denied notifications.");
                    window.dismissPushBanner();
                }
            } catch (error) {
                console.error("Subscription error:", error);
                alert("Please ensure notifications are enabled in your browser settings.");
                window.dismissPushBanner();
            }
        }
    </script>
