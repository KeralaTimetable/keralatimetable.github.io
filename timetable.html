<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="cPHgzg8741NBFQ5HszgVIPA3EMrKJLlj7IHcyLGM2Lo" />
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7313827303298932" crossorigin="anonymous"></script>
    
    <title>KTU Exam Radar | Live Timetable Dashboard</title>
    <link rel="canonical" href="https://keralatimetable.github.io/timetable.html" />

    <meta name="description" content="The ultimate live KTU Exam Timetable dashboard. Track ongoing exams, upcoming exam countdowns, and download B.Tech semester-wise PDF timetables instantly.">
    <meta name="keywords" content="ktu exam timetable, ktu btech timetable, ktu s2 supply timetable 2026, ktu live updates, ktu exam countdown, kerala technological university timetable">
    <meta name="robots" content="index, follow">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* The Sporty Font Class */
        .font-sporty { font-family: 'Orbitron', sans-serif; letter-spacing: 0.05em; }

        .bg-mesh {
            background-color: #f8fafc;
            background-image: radial-gradient(at 40% 20%, hsla(228,100%,74%,0.15) 0px, transparent 50%),
                              radial-gradient(at 80% 0%, hsla(189,100%,56%,0.15) 0px, transparent 50%),
                              radial-gradient(at 0% 50%, hsla(228,100%,74%,0.15) 0px, transparent 50%);
        }
        
        /* Hide scrollbar for the pill filter menu */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Premium Card Hover Effects */
        .timetable-card { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .timetable-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.15); border-color: #c7d2fe; }

        /* Animations */
        @keyframes fadeUpEntry {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { opacity: 0; animation: fadeUpEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
    </style>
</head>
<body class="bg-mesh text-slate-800 antialiased flex flex-col min-h-screen relative overflow-x-hidden">

    <div id="navigation-container" class="min-h-[73px] w-full"></div>

    <main class="flex-grow w-full pb-20">
        
        <div class="w-full max-w-6xl mx-auto px-4 pt-10 pb-8 text-center relative z-20">
            <div class="animate-fade-up inline-flex items-center gap-2 px-4 py-2 rounded-full bg-slate-800 border border-slate-700 text-white text-xs font-bold uppercase tracking-wider mb-6 shadow-sm">
                <i class="fas fa-radar animate-pulse text-cyan-400"></i> Live Exam Radar
            </div>
            <h1 class="animate-fade-up delay-100 text-4xl md:text-5xl font-black text-slate-900 tracking-tight leading-tight mb-4">
                KTU Timetable <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-500 to-orange-500">Dashboard</span>
            </h1>
            <p class="animate-fade-up delay-200 text-slate-500 font-medium md:text-lg max-w-2xl mx-auto mb-2">
                Real-time tracking of APJAKTU examinations.
            </p>
            <p id="live-clock" class="animate-fade-up delay-200 text-sm font-bold text-slate-400 tracking-widest uppercase"></p>
        </div>

        <div class="w-full max-w-6xl mx-auto px-4 relative z-20">
            
            <div id="ongoing-section" class="animate-fade-up delay-300 mb-12 hidden">
                <div class="flex items-center gap-3 mb-5 border-b border-rose-200/50 pb-3">
                    <span class="relative flex h-3.5 w-3.5">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3.5 w-3.5 bg-rose-500 border-2 border-white"></span>
                    </span>
                    <h2 class="text-2xl font-black text-slate-900 tracking-tight">Ongoing Exams</h2>
                </div>
                <div id="ongoing-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    </div>
            </div>

            <div id="upcoming-section" class="animate-fade-up delay-300 mb-16 hidden">
                <div class="flex items-center gap-3 mb-5 border-b border-amber-200/50 pb-3">
                    <i class="fas fa-hourglass-half text-amber-500 text-xl"></i>
                    <h2 class="text-2xl font-black text-slate-900 tracking-tight">Upcoming Exams</h2>
                </div>
                <div id="upcoming-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    </div>
            </div>

            <div class="animate-fade-up delay-300">
                <div class="flex items-center justify-between gap-3 mb-6">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-layer-group text-indigo-500 text-xl"></i>
                        <h2 class="text-2xl font-black text-slate-900 tracking-tight">Semester Vault</h2>
                    </div>
                </div>

                <div class="flex overflow-x-auto no-scrollbar gap-2 mb-8 pb-2 border-b border-slate-200/60 w-full" id="filter-tabs">
                    <button class="filter-btn active bg-slate-800 text-white font-bold px-5 py-2.5 rounded-xl whitespace-nowrap transition-colors" data-filter="All">All Timetables</button>
                    <button class="filter-btn bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 font-bold px-5 py-2.5 rounded-xl whitespace-nowrap transition-colors" data-filter="S1">S1 / S2</button>
                    <button class="filter-btn bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 font-bold px-5 py-2.5 rounded-xl whitespace-nowrap transition-colors" data-filter="S3">S3 / S4</button>
                    <button class="filter-btn bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 font-bold px-5 py-2.5 rounded-xl whitespace-nowrap transition-colors" data-filter="S5">S5 / S6</button>
                    <button class="filter-btn bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 font-bold px-5 py-2.5 rounded-xl whitespace-nowrap transition-colors" data-filter="S7">S7 / S8</button>
                </div>

                <div id="vault-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    </div>
                
                <div id="empty-state" class="hidden text-center py-12 bg-white/50 border border-slate-200 border-dashed rounded-3xl">
                    <i class="fas fa-folder-open text-4xl text-slate-300 mb-3"></i>
                    <h3 class="text-lg font-bold text-slate-700">No active timetables</h3>
                    <p class="text-sm text-slate-500">KTU hasn't released anything for this semester yet.</p>
                </div>
            </div>

        </div>
    </main>

    <script src="components.js?v=12"></script>
    <script>
        loadNavigation('timetable', '', false);

        // --- THE CONTROL CENTER (Add/Edit Timetables Here) ---
        // Date format MUST be: "YYYY-MM-DDTHH:MM:SS" (Time is optional, defaults to midnight)
        const timetablesData = [
            {
                id: 1,
                title: "B.Tech S2 (R,S) Examination May 2026",
                semester: "S2",
                categoryBadge: "S1/S2", 
                type: "Regular & Supply",
                scheme: "2024 Scheme",
                startDate: "2026-05-25T09:30:00", 
                endDate: "2026-06-10T12:30:00",   
                viewLink: "btech/s2/supply-2026.html",
                pdfLink: "#"
            },
            {
                id: 2,
                title: "B.Tech S1 Supplementary Examination (2019 Scheme)",
                semester: "S1",
                categoryBadge: "S1/S2",
                type: "Supply Only",
                scheme: "2019 Scheme",
                startDate: "2026-05-10T09:30:00", 
                endDate: "2026-05-30T12:30:00",
                viewLink: "#",
                pdfLink: "#"
            },
            {
                id: 3,
                title: "B.Tech S4 Honours Examination",
                semester: "S4",
                categoryBadge: "S3/S4",
                type: "Regular",
                scheme: "2019 Scheme",
                startDate: "2026-06-05T13:30:00", 
                endDate: "2026-06-15T16:30:00",
                viewLink: "#",
                pdfLink: "#"
            },
            {
                id: 4,
                title: "B.Tech S8 Regular/Supply April 2026",
                semester: "S8",
                categoryBadge: "S7/S8",
                type: "Reg & Sup",
                scheme: "2019 Scheme",
                startDate: "2026-04-01T09:30:00", 
                endDate: "2026-04-20T12:30:00",
                viewLink: "#",
                pdfLink: "#"
            }
        ];

        // --- STYLING LOGIC FOR SEMESTER BADGES ---
        function getSemesterStyles(semesterStr) {
            const sem = semesterStr.toUpperCase();
            if (sem.includes('S1') || sem.includes('S2')) return { bg: 'bg-indigo-100', text: 'text-indigo-700', border: 'border-indigo-200' };
            if (sem.includes('S3') || sem.includes('S4')) return { bg: 'bg-emerald-100', text: 'text-emerald-700', border: 'border-emerald-200' };
            if (sem.includes('S5') || sem.includes('S6')) return { bg: 'bg-amber-100', text: 'text-amber-700', border: 'border-amber-200' };
            if (sem.includes('S7') || sem.includes('S8')) return { bg: 'bg-rose-100', text: 'text-rose-700', border: 'border-rose-200' };
            return { bg: 'bg-slate-100', text: 'text-slate-700', border: 'border-slate-200' };
        }

        // --- HTML CARD GENERATOR ---
        function generateCardHTML(item, statusText = '', isCountdown = false) {
            const styles = getSemesterStyles(item.semester);
            const startObj = new Date(item.startDate);
            const endObj = new Date(item.endDate);
            
            // Format dates neatly (e.g. "May 25")
            const dateOptions = { month: 'short', day: 'numeric' };
            const dateString = `${startObj.toLocaleDateString('en-US', dateOptions)} - ${endObj.toLocaleDateString('en-US', dateOptions)}`;

            // Build dynamic UI pieces (Using Sporty Font & Larger Size)
            let statusHTML = '';
            if (statusText === 'LIVE') {
                statusHTML = `<div class="w-full bg-rose-500 border-t border-rose-600 p-3 text-center text-[15px] font-sporty text-white tracking-widest shadow-[0_-4px_15px_rgba(244,63,94,0.3)] z-10"><i class="fas fa-circle text-[10px] animate-pulse mr-1.5"></i> Ongoing Now</div>`;
            } else if (isCountdown) {
                statusHTML = `<div class="w-full bg-amber-50 border-t border-amber-200 p-3.5 text-center z-10"><div class="text-[10px] font-bold text-amber-700 uppercase tracking-widest mb-1">Starts In</div><div class="countdown-target font-sporty text-amber-600 text-xl md:text-2xl tracking-wider drop-shadow-sm" data-date="${item.startDate}">00:00:00:00</div></div>`;
            } else if (statusText === 'PAST') {
                statusHTML = `<div class="w-full bg-slate-100 border-t border-slate-200 p-3 text-center text-xs font-bold text-slate-500 uppercase tracking-widest z-10">Exam Completed</div>`;
            }

            return `
                <div class="timetable-card bg-white/90 backdrop-blur-md rounded-2xl border border-slate-200 shadow-sm flex flex-col relative overflow-hidden h-full group" data-category="${item.categoryBadge}">
                    
                    <div class="absolute top-1 right-2 text-7xl font-black text-slate-900 opacity-[0.035] pointer-events-none select-none z-0 leading-none">
                        ${item.semester}
                    </div>

                    <div class="p-5 flex-grow relative z-10 flex flex-col">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="px-2.5 py-1 rounded-md text-[10px] font-black uppercase tracking-wider border ${styles.bg} ${styles.text} ${styles.border}">${item.semester}</span>
                            <span class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider bg-slate-100 text-slate-600 border border-slate-200">${item.type}</span>
                        </div>
                        
                        <h3 class="text-lg font-extrabold text-slate-800 leading-tight mb-2 line-clamp-2 pr-4" title="${item.title}">${item.title}</h3>
                        
                        <div class="flex items-center gap-2 text-xs font-semibold text-slate-400 mb-4">
                            <i class="fas fa-book text-slate-300"></i> ${item.scheme}
                        </div>
                        
                        <div class="mt-auto pt-4 border-t border-slate-100/60">
                            <div class="flex items-center text-sm font-bold text-slate-600 mb-4">
                                <i class="fas fa-calendar-alt text-indigo-400 mr-2"></i> ${dateString}
                            </div>
                            
                            <div class="flex items-center gap-2">
                                <a href="${item.viewLink}" class="flex-grow bg-slate-800 hover:bg-indigo-600 text-white text-center font-bold py-2.5 px-4 rounded-xl transition-colors text-sm shadow-sm">
                                    View Dates
                                </a>
                                <a href="${item.pdfLink}" target="_blank" class="flex-shrink-0 w-11 h-11 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 flex items-center justify-center rounded-xl border border-indigo-100 transition-colors" title="Download PDF">
                                    <i class="fas fa-file-pdf"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                    
                    ${statusHTML}
                </div>
            `;
        }

        // --- DASHBOARD ENGINE (Sorting & Rendering) ---
        function renderDashboard() {
            const now = new Date();
            const ongoingGrid = document.getElementById('ongoing-grid');
            const upcomingGrid = document.getElementById('upcoming-grid');
            const vaultGrid = document.getElementById('vault-grid');
            
            let hasOngoing = false;
            let hasUpcoming = false;

            ongoingGrid.innerHTML = '';
            upcomingGrid.innerHTML = '';
            vaultGrid.innerHTML = '';

            const sortedData = [...timetablesData].sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

            sortedData.forEach(item => {
                const start = new Date(item.startDate);
                const end = new Date(item.endDate);
                
                if (now >= start && now <= end) {
                    ongoingGrid.innerHTML += generateCardHTML(item, 'LIVE', false);
                    vaultGrid.innerHTML += generateCardHTML(item, 'LIVE', false); 
                    hasOngoing = true;
                } 
                else if (now < start) {
                    upcomingGrid.innerHTML += generateCardHTML(item, '', true);
                    vaultGrid.innerHTML += generateCardHTML(item, '', true); 
                    hasUpcoming = true;
                } 
                else {
                    vaultGrid.innerHTML += generateCardHTML(item, 'PAST', false);
                }
            });

            document.getElementById('ongoing-section').style.display = hasOngoing ? 'block' : 'none';
            document.getElementById('upcoming-section').style.display = hasUpcoming ? 'block' : 'none';
        }

        // --- COUNTDOWN TIMER LOGIC ---
        function updateCountdowns() {
            const timers = document.querySelectorAll('.countdown-target');
            const now = new Date().getTime();

            timers.forEach(timer => {
                const targetDate = new Date(timer.getAttribute('data-date')).getTime();
                const distance = targetDate - now;

                if (distance < 0) {
                    timer.innerHTML = "STARTED";
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                timer.innerHTML = `${days}d : ${hours.toString().padStart(2, '0')}h : ${minutes.toString().padStart(2, '0')}m : ${seconds.toString().padStart(2, '0')}s`;
            });
        }

        // --- FILTER PILL LOGIC (For Semester Vault) ---
        function setupFilters() {
            const buttons = document.querySelectorAll('.filter-btn');
            const emptyState = document.getElementById('empty-state');

            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => {
                        b.classList.remove('bg-slate-800', 'text-white');
                        b.classList.add('bg-white', 'text-slate-500');
                    });
                    btn.classList.remove('bg-white', 'text-slate-500');
                    btn.classList.add('bg-slate-800', 'text-white');

                    const filterValue = btn.getAttribute('data-filter');
                    const cards = document.getElementById('vault-grid').children;
                    let visibleCount = 0;

                    for (let i = 0; i < cards.length; i++) {
                        const card = cards[i];
                        if (filterValue === 'All' || card.getAttribute('data-category').includes(filterValue)) {
                            card.style.display = 'flex'; 
                            visibleCount++;
                        } else {
                            card.style.display = 'none';
                        }
                    }

                    emptyState.style.display = visibleCount === 0 ? 'block' : 'none';
                });
            });
        }

        // --- LIVE CLOCK TICKER ---
        function updateLiveClock() {
            const clockEl = document.getElementById('live-clock');
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            clockEl.innerHTML = `System Time: ${now.toLocaleDateString('en-IN', options)}`;
        }

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            renderDashboard();
            setupFilters();
            
            updateLiveClock();
            updateCountdowns();
            setInterval(updateCountdowns, 1000); 
            setInterval(updateLiveClock, 1000);
        });

    </script>
</body>
</html>
