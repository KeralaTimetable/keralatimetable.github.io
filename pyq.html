    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* The Sporty Font Class */
        .font-sporty { font-family: 'Orbitron', sans-serif; letter-spacing: 0.05em; }

        .bg-mesh {
            background-color: #f8fafc;
            background-image: radial-gradient(at 40% 20%, hsla(228,100%,74%,0.15) 0px, transparent 50%),
                              radial-gradient(at 80% 0%, hsla(189,100%,56%,0.15) 0px, transparent 50%),
                              radial-gradient(at 0% 50%, hsla(228,100%,74%,0.15) 0px, transparent 50%);
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .subject-card { transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .subject-card:hover { transform: translateY(-4px); box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.15); border-color: #c7d2fe; }

        @keyframes fadeUpEntry {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUpEntry 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-mesh text-slate-800 antialiased flex flex-col min-h-screen relative overflow-x-hidden">

    <div id="navigation-container" class="min-h-[73px] w-full"></div>

    <main class="flex-grow w-full pb-20">
        
        <div class="w-full max-w-6xl mx-auto px-4 pt-10 pb-6 text-center relative z-20">
            <div class="animate-fade-up inline-flex items-center gap-2 px-4 py-2 rounded-full bg-slate-800 border border-slate-700 text-white text-xs font-bold uppercase tracking-wider mb-6 shadow-sm">
                <i class="fas fa-file-alt text-emerald-400"></i> KTU PYQ Vault
            </div>
            <h1 class="animate-fade-up text-4xl md:text-5xl font-black text-slate-900 tracking-tight leading-tight mb-4">
                Previous Year <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-emerald-500">Questions</span>
            </h1>
            <p class="animate-fade-up text-slate-500 font-medium md:text-lg max-w-2xl mx-auto mb-8">
                Select your branch and semester to instantly access highly optimized PYQ PDFs.
            </p>
        </div>

        <div class="w-full max-w-4xl mx-auto px-4 mb-12 animate-fade-up relative z-20">
            <div class="flex items-center gap-2 mb-4 pl-2">
                <i class="fas fa-fire text-orange-500"></i>
                <h3 class="text-sm font-bold text-slate-600 uppercase tracking-wider">Top Searched Subjects</h3>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <a href="pyq/cse/s1/python.html" class="bg-white/80 backdrop-blur-md border border-slate-200 hover:border-indigo-300 hover:bg-indigo-50 rounded-2xl p-4 flex flex-col items-center justify-center text-center transition-all shadow-sm hover:shadow-md group">
                    <span class="text-[10px] font-sporty text-slate-400 group-hover:text-indigo-400 mb-1">UCEST105</span>
                    <span class="font-bold text-slate-800 text-sm">Python</span>
                </a>
                <a href="pyq/cse/s1/maths.html" class="bg-white/80 backdrop-blur-md border border-slate-200 hover:border-indigo-300 hover:bg-indigo-50 rounded-2xl p-4 flex flex-col items-center justify-center text-center transition-all shadow-sm hover:shadow-md group">
                    <span class="text-[10px] font-sporty text-slate-400 group-hover:text-indigo-400 mb-1">MAT101</span>
                    <span class="font-bold text-slate-800 text-sm">Mathematics</span>
                </a>
                <a href="pyq/cse/s1/ipr.html" class="bg-white/80 backdrop-blur-md border border-slate-200 hover:border-indigo-300 hover:bg-indigo-50 rounded-2xl p-4 flex flex-col items-center justify-center text-center transition-all shadow-sm hover:shadow-md group">
                    <span class="text-[10px] font-sporty text-slate-400 group-hover:text-indigo-400 mb-1">UCEST206</span>
                    <span class="font-bold text-slate-800 text-sm">IPR Notes</span>
                </a>
                <a href="pyq/me/s1/graphics.html" class="bg-white/80 backdrop-blur-md border border-slate-200 hover:border-indigo-300 hover:bg-indigo-50 rounded-2xl p-4 flex flex-col items-center justify-center text-center transition-all shadow-sm hover:shadow-md group">
                    <span class="text-[10px] font-sporty text-slate-400 group-hover:text-indigo-400 mb-1">EST110</span>
                    <span class="font-bold text-slate-800 text-sm">Graphics</span>
                </a>
            </div>
        </div>

        <div class="w-full max-w-5xl mx-auto px-4 relative z-20">
            <div class="bg-white/60 backdrop-blur-xl border border-white shadow-[0_20px_50px_rgba(79,70,229,0.05)] rounded-3xl p-6 md:p-8">
                
                <div class="mb-8">
                    <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <span class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-xs">1</span> 
                        Select Branch
                    </h2>
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-3" id="branch-container">
                        </div>
                </div>

                <div class="mb-8 border-t border-slate-200/60 pt-8" id="semester-section">
                    <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <span class="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xs">2</span> 
                        Select Semester
                    </h2>
                    <div class="flex overflow-x-auto no-scrollbar gap-2 pb-2" id="semester-container">
                        </div>
                </div>

                <div class="border-t border-slate-200/60 pt-8" id="subject-section">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest flex items-center gap-2">
                            <span class="w-6 h-6 rounded-full bg-rose-100 text-rose-600 flex items-center justify-center text-xs"><i class="fas fa-check"></i></span> 
                            Available Subjects
                        </h2>
                        <span id="result-count" class="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full">0 Subjects</span>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" id="subject-container">
                        </div>
                </div>

            </div>
        </div>
    </main>

    <script src="components.js?v=12"></script>
    <script>
        // Load Navbar (Active tab: none, as this is a new hub, but you can add 'pyq' to components.js later)
        loadNavigation('', '', false);

        // --- THE PYQ DATABASE ---
        // This object acts as your router. It connects the UI to your SEO sub-pages.
        const pyqDatabase = {
            'CSE': {
                name: 'Computer Science',
                icon: 'fa-laptop-code',
                semesters: {
                    'S1': [
                        { code: 'MAT101', name: 'Linear Algebra and Calculus', link: 'pyq/cse/s1/maths.html' },
                        { code: 'PHT100', name: 'Engineering Physics A', link: 'pyq/cse/s1/physics.html' },
                        { code: 'EST102', name: 'Programming in C', link: 'pyq/cse/s1/c-programming.html' },
                        { code: 'UCEST105', name: 'Introduction to Python', link: 'pyq/cse/s1/python.html' }
                    ],
                    'S2': [
                        { code: 'MAT102', name: 'Vector Calculus', link: 'pyq/cse/s2/vector-calculus.html' },
                        { code: 'EST130', name: 'Basics of Electrical Engineering', link: 'pyq/cse/s2/electrical.html' }
                    ],
                    'S3': [
                        { code: 'CST201', name: 'Data Structures', link: 'pyq/cse/s3/data-structures.html' },
                        { code: 'CST203', name: 'Logic System Design', link: 'pyq/cse/s3/lsd.html' },
                        { code: 'CST205', name: 'Object Oriented Programming', link: 'pyq/cse/s3/oop.html' }
                    ]
                }
            },
            'CE': {
                name: 'Civil Engineering',
                icon: 'fa-building',
                semesters: {
                    'S1': [
                        { code: 'MAT101', name: 'Linear Algebra and Calculus', link: 'pyq/ce/s1/maths.html' },
                        { code: 'CYT100', name: 'Engineering Chemistry', link: 'pyq/ce/s1/chemistry.html' }
                    ]
                }
            },
            'ME': { name: 'Mechanical', icon: 'fa-cogs', semesters: { 'S1': [] } },
            'EEE': { name: 'Electrical', icon: 'fa-bolt', semesters: { 'S1': [] } },
            'ECE': { name: 'Electronics', icon: 'fa-microchip', semesters: { 'S1': [] } }
        };

        // --- STATE MANAGEMENT ---
        let activeBranch = 'CSE'; // Default selection
        let activeSem = 'S1';     // Default selection

        // --- RENDER FUNCTIONS ---

        function renderBranches() {
            const container = document.getElementById('branch-container');
            container.innerHTML = '';

            Object.keys(pyqDatabase).forEach(branchKey => {
                const branch = pyqDatabase[branchKey];
                const isActive = activeBranch === branchKey;
                
                const btnClass = isActive 
                    ? 'bg-slate-800 text-white border-slate-800 shadow-md ring-2 ring-indigo-500/30' 
                    : 'bg-white text-slate-600 border-slate-200 hover:border-indigo-300 hover:bg-slate-50';

                const iconColor = isActive ? 'text-indigo-400' : 'text-slate-400';

                container.innerHTML += `
                    <button onclick="selectBranch('${branchKey}')" class="flex flex-col items-center justify-center p-4 rounded-2xl border transition-all duration-200 ${btnClass}">
                        <i class="fas ${branch.icon} text-xl mb-2 ${iconColor}"></i>
                        <span class="font-bold text-sm tracking-wide">${branchKey}</span>
                    </button>
                `;
            });
        }

        function renderSemesters() {
            const container = document.getElementById('semester-container');
            container.innerHTML = '';

            // Standardize 8 semesters for the UI
            const allSems = ['S1', 'S2', 'S3', 'S4', 'S5', 'S6', 'S7', 'S8'];

            allSems.forEach(sem => {
                const isActive = activeSem === sem;
                const hasData = pyqDatabase[activeBranch].semesters[sem] && pyqDatabase[activeBranch].semesters[sem].length > 0;
                
                let btnClass = '';
                if (isActive) {
                    btnClass = 'bg-indigo-600 text-white border-indigo-600 shadow-md';
                } else if (!hasData) {
                    btnClass = 'bg-slate-50 text-slate-400 border-slate-200 opacity-50 cursor-not-allowed'; // Disable empty sems visually
                } else {
                    btnClass = 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50 hover:border-indigo-300';
                }

                container.innerHTML += `
                    <button ${!hasData ? 'disabled' : ''} onclick="selectSemester('${sem}')" class="flex-shrink-0 px-6 py-3 rounded-xl border font-bold text-sm transition-all duration-200 ${btnClass}">
                        ${sem}
                    </button>
                `;
            });
        }

        function renderSubjects() {
            const container = document.getElementById('subject-container');
            const countBadge = document.getElementById('result-count');
            container.innerHTML = '';

            const subjects = pyqDatabase[activeBranch].semesters[activeSem] || [];
            
            countBadge.innerText = `${subjects.length} Subjects`;

            if (subjects.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-12 text-center bg-slate-50 border border-slate-200 border-dashed rounded-2xl">
                        <i class="fas fa-folder-open text-3xl text-slate-300 mb-3"></i>
                        <h3 class="text-sm font-bold text-slate-600">No subjects added yet</h3>
                        <p class="text-xs text-slate-400 mt-1">We are updating the database for ${activeBranch} ${activeSem}.</p>
                    </div>
                `;
                return;
            }

            // Animate grid entry
            container.classList.remove('animate-fade-up');
            void container.offsetWidth; // trigger reflow
            container.classList.add('animate-fade-up');

            subjects.forEach(subject => {
                container.innerHTML += `
                    <div class="subject-card bg-white border border-slate-200 rounded-2xl p-5 flex flex-col relative overflow-hidden group">
                        <div class="absolute -bottom-2 -right-2 text-6xl font-black text-slate-900 opacity-[0.02] pointer-events-none select-none z-0">
                            ${activeSem}
                        </div>
                        
                        <div class="relative z-10 flex-grow flex flex-col">
                            <span class="inline-block px-2.5 py-1 bg-slate-100 border border-slate-200 text-slate-500 text-[10px] font-sporty rounded-md mb-3 w-max">
                                ${subject.code}
                            </span>
                            <h3 class="text-base font-extrabold text-slate-800 leading-tight mb-4 pr-2">
                                ${subject.name}
                            </h3>
                            
                            <a href="${subject.link}" class="mt-auto flex items-center justify-center gap-2 w-full bg-slate-50 hover:bg-indigo-600 text-slate-600 hover:text-white font-bold py-2.5 rounded-xl text-sm transition-colors border border-slate-200 hover:border-indigo-600">
                                <i class="fas fa-file-pdf"></i> View PYQs
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        // --- INTERACTION HANDLERS ---
        function selectBranch(branch) {
            activeBranch = branch;
            
            // Auto-select S1 if the newly selected branch doesn't have data for the current activeSem
            if (!pyqDatabase[activeBranch].semesters[activeSem] || pyqDatabase[activeBranch].semesters[activeSem].length === 0) {
                activeSem = 'S1'; 
            }
            
            updateUI();
        }

        function selectSemester(sem) {
            activeSem = sem;
            updateUI();
        }

        function updateUI() {
            renderBranches();
            renderSemesters();
            renderSubjects();
        }

        // --- INITIALIZE ---
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
        });

    </script>
</body>
</html>
