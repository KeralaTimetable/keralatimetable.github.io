<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="cPHgzg8741NBFQ5HszgVIPA3EMrKJLlj7IHcyLGM2Lo" />
    
    <title>KTU Previous Year Question Papers | Kerala Timetable</title>
    <meta name="description" content="Search and instantly download KTU B.Tech PYQs. Fast, watermarked, and ready for your exams.">
    
    <script src="/tailwind-local.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            color: #0f172a;
            overflow-x: hidden;
        }

        /* 3D Parallax & Background Grid */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
            mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
            pointer-events: none;
        }

        .ambient-glow {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, rgba(255, 255, 255, 0) 60%);
            top: -20vw;
            left: 20vw;
            z-index: 0;
            pointer-events: none;
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .glass-input {
            background: rgba(241, 245, 249, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.05);
            color: #1e293b; 
            font-family: 'Fira Code', monospace;
        }
        .glass-input:focus {
            outline: none;
            background: #ffffff;
            border-color: #10b981; 
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .glass-card {
            background: #ffffff;
            border: 1px solid #e2e8f0; 
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 15px 30px -10px rgba(16, 185, 129, 0.15);
        }

        /* Typewriter Cursor */
        .cursor::after {
            content: '|';
            animation: blink 1s step-start infinite;
            color: #10b981;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Loader */
        .loader {
            border: 3px solid rgba(0,0,0,0.05);
            border-top: 3px solid #10b981;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom Scrollbar for results */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col relative" onmousemove="handleParallax(event)">

    <div class="bg-grid"></div>
    <div class="ambient-glow" id="glowOrbs"></div>

    <div id="navigation-container" class="z-50 relative"></div>

    <main class="flex-grow w-full max-w-5xl mx-auto px-4 pt-20 pb-20 relative z-10 flex flex-col items-center">
        
        <div class="text-center mb-10 transform translate-z-10">
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight leading-tight mb-4">
                KTU Question Papers <br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-cyan-500">Instantly.</span>
            </h1>
            <p class="text-slate-500 font-medium md:text-lg mb-8">
                Explore <span id="typewriter" class="text-emerald-600 font-bold cursor"></span>
            </p>
        </div>

        <div id="parallax-container" class="w-full max-w-2xl relative perspective-1000 mb-16">
            <div id="search-card" class="glass-panel rounded-3xl p-6 md:p-8 w-full flex flex-col gap-4 relative z-20">
                
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest text-center">Start by entering your course code</p>
                
                <form id="searchForm" onsubmit="executeSearch(event)" class="relative flex items-center">
                    <i class="fas fa-search absolute left-6 text-slate-400 text-lg"></i>
                    <input type="text" id="searchInput" autocomplete="off" placeholder="e.g. MAT101, UCEST105..." 
                           class="glass-input w-full rounded-2xl py-5 pl-14 pr-16 text-lg transition-all" required>
                    
                    <button type="submit" class="absolute right-3 w-12 h-12 bg-emerald-500 hover:bg-emerald-400 text-white rounded-xl flex items-center justify-center transition-all shadow-[0_5px_15px_rgba(16,185,129,0.3)] hover:scale-105">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>

        <div id="results-area" class="w-full max-w-4xl hidden flex-col items-center">
            
            <div id="loading-state" class="hidden flex-col items-center justify-center py-10">
                <div class="loader mb-4"></div>
                <p class="text-sm font-bold text-slate-500 animate-pulse">Searching KTU Database...</p>
            </div>

            <div id="results-header" class="w-full flex justify-between items-end border-b border-slate-200 pb-4 mb-6 hidden">
                <h3 class="text-xl font-black text-slate-800"><span id="search-term-display" class="text-emerald-600 font-'Fira Code'"></span> Papers</h3>
                <span id="result-count" class="text-xs font-bold text-slate-600 bg-slate-100 px-3 py-1 rounded-full border border-slate-200"></span>
            </div>

            <div id="results-grid" class="w-full grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>

    </main>

    <script src="components.js?v=12"></script>
    <script>
        if(typeof loadNavigation === 'function') loadNavigation('', '', false);

        // --- 1. Typewriter Effect ---
        const words = ["MAT101...", "UCEST105...", "EST110...", "GAMAT101...", "Previous Papers..."];
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typeTarget = document.getElementById("typewriter");

        function type() {
            const currentWord = words[wordIndex];
            if (isDeleting) {
                typeTarget.innerText = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typeTarget.innerText = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 50 : 100;

            if (!isDeleting && charIndex === currentWord.length) {
                typeSpeed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typeSpeed = 500;
            }
            setTimeout(type, typeSpeed);
        }
        setTimeout(type, 1000);

        // --- 2. 3D Parallax Tilt Effect ---
        const card = document.getElementById('search-card');
        const container = document.getElementById('parallax-container');

        function handleParallax(e) {
            if(window.innerWidth < 768) return; 
            
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left; 
            const y = e.clientY - rect.top;  
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = ((y - centerY) / centerY) * -8;
            const rotateY = ((x - centerX) / centerX) * 8;

            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
        }

        document.body.addEventListener('mouseleave', () => {
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
        });

        // --- 3. Render API Integration ---
        const API_URL = "https://ktu-papers-api.onrender.com"; // Your live Python API

        async function executeSearch(e) {
            e.preventDefault();
            const query = document.getElementById('searchInput').value.trim().toUpperCase();
            if(!query) return;

            const resultsArea = document.getElementById('results-area');
            const loader = document.getElementById('loading-state');
            const grid = document.getElementById('results-grid');
            const header = document.getElementById('results-header');

            // UI Resets
            resultsArea.classList.remove('hidden');
            resultsArea.classList.add('flex');
            loader.classList.remove('hidden');
            loader.classList.add('flex');
            grid.innerHTML = '';
            header.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}/search?q=${query}`);
                if (!response.ok) throw new Error("API Error");
                
                const data = await response.json();
                
                loader.classList.remove('flex');
                loader.classList.add('hidden');
                header.classList.remove('hidden');
                
                document.getElementById('search-term-display').innerText = query;
                document.getElementById('result-count').innerText = `${data.count} found`;

                if (data.count === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full py-12 text-center bg-slate-50 border border-slate-200 rounded-2xl">
                            <i class="fas fa-ghost text-4xl text-slate-300 mb-4"></i>
                            <h3 class="text-slate-600 font-bold">No papers found for "${query}"</h3>
                            <p class="text-slate-400 text-sm mt-2">Check the course code and try again.</p>
                        </div>
                    `;
                    return;
                }

                // Render Results
                data.results.forEach(paper => {
                    grid.innerHTML += `
                        <div class="glass-card rounded-2xl p-5 flex flex-col justify-between h-full group">
                            <div>
                                <div class="flex justify-between items-start mb-3">
                                    <span class="inline-block px-2.5 py-1 bg-emerald-50 border border-emerald-200 text-emerald-700 text-[10px] font-bold font-'Fira Code' rounded-md">
                                        ${paper.course_code}
                                    </span>
                                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">
                                        <i class="far fa-calendar-alt"></i> ${paper.exam_session}
                                    </span>
                                </div>
                                <h4 class="text-sm font-bold text-slate-800 leading-snug mb-5 line-clamp-2" title="${paper.title}">
                                    ${paper.title}
                                </h4>
                            </div>
                            
                            <button onclick="downloadPaper('${paper.handle}', '${paper.exam_session}', this)" class="w-full bg-white hover:bg-emerald-500 text-slate-700 hover:text-white border border-slate-200 hover:border-emerald-500 text-xs font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 shadow-sm">
                                <i class="fas fa-download transition-transform"></i>
                                <span>Get PDF</span>
                            </button>
                        </div>
                    `;
                });

            } catch (error) {
                console.error(error);
                loader.classList.remove('flex');
                loader.classList.add('hidden');
                grid.innerHTML = `
                    <div class="col-span-full py-8 text-center text-rose-600 bg-rose-50 border border-rose-200 rounded-2xl">
                        <i class="fas fa-exclamation-triangle mb-2"></i>
                        <p class="text-sm font-bold">Failed to connect to the database server.</p>
                        <p class="text-xs text-rose-500 mt-1">Render API might be waking up (takes ~30s). Please try again.</p>
                    </div>
                `;
            }
        }

        // --- 4. Watermarked PDF Download ---
        async function downloadPaper(handle, examSession, btnElement) {
            const originalHTML = btnElement.innerHTML;
            btnElement.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;
            btnElement.disabled = true;
            
            // Loading State styling
            btnElement.classList.remove('hover:bg-emerald-500', 'hover:text-white');
            btnElement.classList.add('bg-emerald-50', 'text-emerald-600', 'border-emerald-200', 'cursor-not-allowed');

            try {
                const response = await fetch(`${API_URL}/download`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        handles: [handle],
                        watermark: true
                    })
                });

                if (!response.ok) throw new Error("Download failed");

                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = downloadUrl;
                
                const courseCode = document.getElementById('searchInput').value.trim().toUpperCase();
                const safeSession = examSession.replace(/\s+/g, '_');
                a.download = `KTU_${courseCode}_${safeSession}.pdf`; 
                
                document.body.appendChild(a);
                a.click();
                a.remove();
                
                btnElement.innerHTML = `<i class="fas fa-check"></i> Downloaded`;
                setTimeout(() => {
                    btnElement.innerHTML = originalHTML;
                    btnElement.disabled = false;
                    btnElement.classList.remove('bg-emerald-50', 'text-emerald-600', 'border-emerald-200', 'cursor-not-allowed');
                    btnElement.classList.add('hover:bg-emerald-500', 'hover:text-white');
                }, 2000);

            } catch (error) {
                console.error(error);
                alert("Could not process PDF. Server might be busy.");
                btnElement.innerHTML = originalHTML;
                btnElement.disabled = false;
                btnElement.classList.remove('bg-emerald-50', 'text-emerald-600', 'border-emerald-200', 'cursor-not-allowed');
                btnElement.classList.add('hover:bg-emerald-500', 'hover:text-white');
            }
        }
    </script>
</body>
</html>
