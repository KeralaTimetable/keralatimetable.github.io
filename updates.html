<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTU Notification and Announcements | KTU Latest Updates</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased flex flex-col min-h-screen relative overflow-x-hidden">

    <!-- Mobile Sidebar Menu (Hidden by default) -->
    <div id="mobile-menu" class="fixed inset-y-0 left-0 w-64 bg-white shadow-2xl transform -translate-x-full transition-transform duration-300 ease-in-out z-[60] flex flex-col border-r border-slate-100">
        <!-- Sidebar Header -->
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <h2 class="text-lg font-extrabold text-slate-900 tracking-tight">Menu</h2>
            <button id="close-menu-btn" class="p-2 text-slate-400 hover:text-red-500 transition-colors rounded-full hover:bg-white shadow-sm focus:outline-none">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>
        
        <!-- Sidebar Links -->
        <nav class="flex-grow py-6 px-4 flex flex-col gap-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl font-semibold transition-all">
                <i class="fas fa-home w-5 text-center text-slate-400"></i> Home
            </a>
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl font-semibold transition-all">
                <i class="fas fa-server w-5 text-center text-slate-400"></i> KTU Server Status
            </a>
            <!-- Active State in Sidebar -->
            <a href="updates.html" class="flex items-center gap-3 px-4 py-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold transition-all border border-indigo-100">
                <i class="fas fa-bullhorn w-5 text-center"></i> KTU Latest Updates
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl font-semibold transition-all">
                <i class="fas fa-info-circle w-5 text-center text-slate-400"></i> About
            </a>
        </nav>
        
        <!-- Sidebar Footer -->
        <div class="p-6 border-t border-slate-100 text-center">
            <p class="text-xs text-slate-400 font-medium tracking-wide">© 2026 Kerala Timetable</p>
        </div>
    </div>

    <!-- Overlay (Darkens background when menu is open) -->
    <div id="menu-overlay" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-50 opacity-0 pointer-events-none transition-opacity duration-300"></div>

    <!-- Main Sticky Header -->
    <header class="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm transition-all duration-300">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
            
            <!-- Left Side: Hamburger & Logo -->
            <div class="flex items-center gap-3">
                <!-- Hamburger Button -->
                <button id="open-menu-btn" class="p-2 -ml-2 text-slate-600 hover:text-indigo-600 hover:bg-slate-100 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-50 lg:hidden">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                
                <!-- Logo -->
                <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                    <svg class="w-6 h-6 sm:w-7 sm:h-7 text-indigo-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <h1 class="text-xl sm:text-2xl font-extrabold tracking-tight text-slate-900 leading-none">Kerala <span class="text-indigo-600">Timetable</span></h1>
                </a>
            </div>

            <!-- Right Side: Desktop Nav (Hidden on Mobile) -->
            <div class="hidden lg:flex gap-3">
                <a href="index.html" class="text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 px-5 py-2.5 rounded-full flex items-center gap-2 transition-colors">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span> Status
                </a>
                <a href="updates.html" class="text-sm font-bold text-white bg-indigo-600 px-5 py-2.5 rounded-full shadow-md flex items-center gap-2">
                    <i class="fas fa-bullhorn text-[10px]"></i> Notice Board
                </a>
            </div>
            
            <!-- Right Side: Mobile Quick Action (Notice Board Bell) -->
            <div class="lg:hidden">
                <a href="updates.html" class="w-10 h-10 flex items-center justify-center bg-indigo-50 text-indigo-600 rounded-full border border-indigo-100 shadow-sm">
                   <i class="fas fa-bell"></i>
                </a>
            </div>

        </div>
    </header>

    <!-- Main Content Area -->
    <main class="max-w-3xl mx-auto px-4 pt-8 pb-12 w-full flex-grow">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-slate-900 mb-2">KTU Notice Board</h2>
            <p class="text-slate-500 font-medium">Fast, ad-free updates directly from the university API.</p>
        </div>

        <!-- Search Bar -->
        <div class="relative mb-8">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fas fa-search text-slate-400"></i>
            </div>
            <input type="text" id="searchInput" class="block w-full pl-11 pr-4 py-3.5 bg-white border border-slate-200 rounded-xl text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent shadow-sm transition-all" placeholder="Search for timetables, exams, or keywords...">
        </div>

        <!-- Notices Container -->
        <div id="notices-container" class="flex flex-col gap-4">
            <!-- Loading State -->
            <div class="text-center py-10">
                <i class="fas fa-circle-notch fa-spin text-indigo-500 text-3xl mb-3"></i>
                <p class="text-slate-500 font-medium">Loading latest notices...</p>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script>
        // --- Hamburger Menu Logic ---
        document.addEventListener('DOMContentLoaded', () => {
            const openBtn = document.getElementById('open-menu-btn');
            const closeBtn = document.getElementById('close-menu-btn');
            const menu = document.getElementById('mobile-menu');
            const overlay = document.getElementById('menu-overlay');

            function toggleMenu() {
                menu.classList.toggle('-translate-x-full');
                
                if (menu.classList.contains('-translate-x-full')) {
                    overlay.classList.remove('opacity-100', 'pointer-events-auto');
                    overlay.classList.add('opacity-0', 'pointer-events-none');
                    document.body.style.overflow = ''; 
                } else {
                    overlay.classList.remove('opacity-0', 'pointer-events-none');
                    overlay.classList.add('opacity-100', 'pointer-events-auto');
                    document.body.style.overflow = 'hidden'; 
                }
            }

            openBtn.addEventListener('click', toggleMenu);
            closeBtn.addEventListener('click', toggleMenu);
            overlay.addEventListener('click', toggleMenu);
        });

        // --- Notice Board Data Logic ---
        let allNotices = [];

        // 1. Fetch the data from your automated JSON file
        async function loadNotices() {
            try {
                const response = await fetch('notices.json'); 
                if (!response.ok) throw new Error("Failed to fetch data");
                
                const data = await response.json();
                allNotices = data.content || [];
                
                // 2. Sort the notices by Date (Newest First)
                allNotices.sort((a, b) => {
                    const dateA = new Date(a.announcementDate);
                    const dateB = new Date(b.announcementDate);
                    return dateB - dateA; 
                });

                // 3. Render them to the screen
                renderNotices(allNotices);
            } catch (error) {
                console.error("Error loading notices:", error);
                document.getElementById('notices-container').innerHTML = `
                    <div class="text-center py-10 text-red-500 font-medium bg-red-50 rounded-2xl border border-red-100">
                        <i class="fas fa-exclamation-triangle mb-2 text-xl"></i><br>
                        Failed to load notices. Please try again later.
                    </div>`;
            }
        }

        // 4. Render the UI Cards
        function renderNotices(noticesToRender) {
            const container = document.getElementById('notices-container');
            container.innerHTML = '';

            if (noticesToRender.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10 text-slate-500 font-medium bg-white rounded-2xl border border-slate-200 shadow-sm">
                        <i class="fas fa-search mb-2 text-2xl text-slate-300"></i><br>
                        No matching notices found.
                    </div>`;
                return;
            }

            noticesToRender.forEach(notice => {
                const subject = notice.subject || "Untitled Notification";
                const rawDate = notice.announcementDate || "";
                
                // Format Date nicely
                let dateStr = rawDate;
                let noticeDateObj = new Date(rawDate);
                try {
                    const parts = rawDate.split(',');
                    if (parts.length > 1) {
                         const datePart = parts[1].trim(); 
                         const yearPart = parts[2] ? parts[2].trim() : noticeDateObj.getFullYear();
                         dateStr = `${datePart}, ${yearPart}`;
                    }
                } catch(e) {}

                // Calculate if notice is "New" (Posted within the last 7 days)
                const today = new Date();
                const diffTime = Math.abs(today - noticeDateObj);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                const isNew = diffDays <= 7;
                
                // Create the Badge
                let newBadge = isNew 
                    ? `<span class="inline-flex items-center gap-1 bg-emerald-50 text-emerald-600 border border-emerald-100 text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wider animate-pulse">
                            <i class="fas fa-star text-[10px]"></i> New
                       </span>`
                    : `<span class="inline-flex items-center gap-1 bg-indigo-50 text-indigo-600 border border-indigo-100 text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wider">
                           <i class="fas fa-bullhorn text-[10px]"></i> KTU
                       </span>`;

                // Build the Card HTML
                const card = `
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md hover:border-indigo-300 transition-all duration-300 flex flex-col gap-4 group">
                        
                        <div class="flex-grow">
                            <h3 class="text-slate-800 font-bold text-base md:text-lg leading-snug group-hover:text-indigo-600 transition-colors">${subject}</h3>
                        </div>
                        
                        <div class="flex flex-wrap items-center justify-between mt-auto pt-4 border-t border-slate-100 gap-3">
                            <div class="flex items-center gap-3">
                                <div class="flex items-center text-slate-500 text-xs font-semibold bg-slate-50 px-2.5 py-1.5 rounded-lg border border-slate-200">
                                    <i class="far fa-calendar-alt mr-1.5 text-slate-400"></i> ${dateStr}
                                </div>
                                ${newBadge}
                            </div>
                            
                            <a href="${notice.urlHref || 'https://ktu.edu.in/Menu/announcements'}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center bg-indigo-50 hover:bg-indigo-600 text-indigo-700 hover:text-white text-xs font-bold px-4 py-2 rounded-lg transition-colors shadow-sm gap-1.5 whitespace-nowrap border border-indigo-100 hover:border-indigo-600 group-hover:bg-indigo-600 group-hover:text-white">
                                View Official <i class="fas fa-arrow-right text-[10px]"></i>
                            </a>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // 5. Search Bar Logic (Filters instantly as you type)
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredNotices = allNotices.filter(notice => 
                (notice.subject || "").toLowerCase().includes(searchTerm)
            );
            renderNotices(filteredNotices);
        });

        // Initialize the fetch sequence
        loadNotices();
    </script>
</body>
</html>
