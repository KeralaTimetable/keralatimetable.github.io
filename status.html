<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7313827303298932" crossorigin="anonymous"></script>
    
    <title>KTU Live Status | Student Portal & Server Check</title>
    <meta name="description" content="Live check to see if the official APJ Abdul Kalam Technological University (KTU) website, student login portal, or result servers are currently down, slow, or offline today.">
    <meta name="keywords" content="is ktu down, ktu site status, ktu student portal not opening, ktu server down, ktu live status, ktu login error, ktu result site down, apjaktu server status, ktu website slow">
    <meta name="robots" content="index, follow">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .ad-space { 
            background: rgba(241, 245, 249, 0.7); 
            display: flex; align-items: center; justify-content: center; 
        }
    </style>
</head>
<body class="text-slate-800 antialiased flex flex-col min-h-screen">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <h1 class="text-xl font-extrabold tracking-tight text-slate-900">Kerala <span class="text-indigo-600">Timetable</span></h1>
            </a>
            <div class="flex gap-3">
                <a href="status.html" class="text-xs font-bold text-slate-600 bg-slate-100 px-4 py-2 rounded-full flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span> Status
                </a>
                <a href="updates.html" class="text-xs font-bold text-white bg-indigo-600 px-4 py-2 rounded-full">Notice Board</a>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-3xl mx-auto px-4 py-8 w-full flex flex-col">
        
        <h2 class="text-3xl font-extrabold text-slate-900 mb-6 text-center">KTU System Status</h2>

        <div id="overall-banner" class="w-full rounded-xl p-5 mb-8 border shadow-sm flex items-center gap-4 bg-slate-50 border-slate-200">
            <div id="overall-icon" class="w-10 h-10 rounded-full bg-slate-200 animate-pulse"></div>
            <div>
                <h3 id="overall-text" class="text-xl font-bold text-slate-700">Fetching live data...</h3>
                <p id="overall-time" class="text-sm text-slate-500">Please wait</p>
            </div>
        </div>

        <div id="ssl-alert-banner" class="hidden w-full mb-8 bg-[#2a1f1a] border border-[#d97706] rounded-xl p-5 shadow-sm">
            <div class="flex items-start gap-3">
                <svg class="w-6 h-6 text-[#f59e0b] mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                <div>
                    <h3 class="text-lg font-bold text-[#f59e0b] mb-1">Portal SSL Certificate Issue</h3>
                    <p class="text-slate-300 text-sm leading-relaxed">
                        Login is currently available only via <strong>Mozilla Firefox</strong> or <strong>Chrome Incognito</strong>. Click <code class="bg-black/50 px-1 py-0.5 rounded border border-slate-700 text-xs">Advanced -> Proceed</code>.
                    </p>
                </div>
            </div>
        </div>

        <h3 class="text-lg font-bold text-slate-800 mb-4">Individual Services</h3>
        <div id="services-container" class="space-y-3 mb-10">
            <div class="bg-white border border-slate-200 rounded-xl p-5 flex justify-between items-center shadow-sm">
                <div class="h-5 bg-slate-200 rounded w-1/3 animate-pulse"></div>
                <div class="h-6 bg-slate-200 rounded-full w-20 animate-pulse"></div>
            </div>
            <div class="bg-white border border-slate-200 rounded-xl p-5 flex justify-between items-center shadow-sm">
                <div class="h-5 bg-slate-200 rounded w-1/4 animate-pulse"></div>
                <div class="h-6 bg-slate-200 rounded-full w-20 animate-pulse"></div>
            </div>
        </div>

        <button onclick="fetchHistory()" class="mb-10 mx-auto bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold py-2.5 px-6 rounded-full transition-all flex items-center gap-2 shadow-sm text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            Refresh Status
        </button>

        <div class="border-t border-slate-200 pt-8 w-full">
            <h3 class="text-lg font-bold text-slate-800 mb-4">Past Incidents (Last 12 Hours)</h3>
            <ul id="history-list" class="space-y-3"></ul>
        </div>

        <div class="ad-space w-full min-h-[250px] mt-10 rounded-xl overflow-hidden flex items-center justify-center border border-slate-200">
            <script async="async" data-cfasync="false" src="https://pl29230436.profitablecpmratenetwork.com/d8d90802dcf5c4de595fff221ca18899/invoke.js"></script>
            <div id="container-d8d90802dcf5c4de595fff221ca18899"></div>
        </div>

    </main>

    <script>
        function updateOverallBanner(status, timestamp) {
            const banner = document.getElementById('overall-banner');
            const icon = document.getElementById('overall-icon');
            const text = document.getElementById('overall-text');
            const timeEl = document.getElementById('overall-time');

            // Format "Last checked at 4:30 PM"
            const recordTime = new Date(timestamp);
            const timeString = recordTime.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            timeEl.innerText = `Last checked at ${timeString}`;
            text.innerText = status;

            icon.classList.remove('animate-pulse');
            icon.innerHTML = ''; // clear loading state

            if (status === "All Systems Operational") {
                banner.className = "w-full rounded-xl p-5 mb-8 border flex items-center gap-4 bg-emerald-50 border-emerald-200";
                text.className = "text-xl font-bold text-emerald-800";
                icon.className = "w-10 h-10 rounded-full bg-emerald-500 flex items-center justify-center text-white shadow-[0_0_15px_rgba(16,185,129,0.4)]";
                icon.innerHTML = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
            } 
            else if (status === "Partial Outage" || status === "SSL Issues Detected") {
                banner.className = "w-full rounded-xl p-5 mb-8 border flex items-center gap-4 bg-amber-50 border-amber-200";
                text.className = "text-xl font-bold text-amber-800";
                icon.className = "w-10 h-10 rounded-full bg-amber-500 flex items-center justify-center text-white shadow-[0_0_15px_rgba(245,158,11,0.4)]";
                icon.innerHTML = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            } 
            else {
                banner.className = "w-full rounded-xl p-5 mb-8 border flex items-center gap-4 bg-red-50 border-red-200";
                text.className = "text-xl font-bold text-red-800";
                icon.className = "w-10 h-10 rounded-full bg-red-500 flex items-center justify-center text-white shadow-[0_0_15px_rgba(239,68,68,0.4)]";
                icon.innerHTML = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
            }
        }

        async function fetchHistory() {
            try {
                // Fetch the latest JSON built by the Python script
                const response = await fetch('status-history.json?t=' + new Date().getTime());
                const data = await response.json();
                
                if (data.length === 0) return;

                const latest = data[0];
                updateOverallBanner(latest.overall_status, latest.timestamp);

                // Check for SSL warning across all services
                const sslBanner = document.getElementById('ssl-alert-banner');
                let hasSSL = false;
                for (const [name, info] of Object.entries(latest.services)) {
                    if (info.status === "SSL Issue") hasSSL = true;
                }
                sslBanner.style.display = hasSSL ? 'block' : 'none';

                // Render Individual Services List
                const servicesContainer = document.getElementById('services-container');
                servicesContainer.innerHTML = ''; 

                for (const [name, info] of Object.entries(latest.services)) {
                    let pillClass = "bg-red-100 text-red-700 border-red-200";
                    let statusText = info.status === "Offline" ? info.error_type : info.status;
                    
                    if (info.status === "Online") {
                        pillClass = "bg-emerald-100 text-emerald-800 border-emerald-200";
                        statusText = "Operational";
                    } else if (info.status === "SSL Issue") {
                        pillClass = "bg-amber-100 text-amber-800 border-amber-200";
                        statusText = "SSL Error";
                    }

                    servicesContainer.innerHTML += `
                        <div class="bg-white border border-slate-200 rounded-xl p-4 flex justify-between items-center shadow-sm">
                            <div class="flex flex-col">
                                <span class="font-bold text-slate-800 text-sm md:text-base">${name}</span>
                                <span class="text-xs text-slate-400 mt-0.5">Response: ${info.ping}ms</span>
                            </div>
                            <span class="text-xs font-bold px-3 py-1 rounded-full border ${pillClass}">
                                ${statusText}
                            </span>
                        </div>
                    `;
                }

                // Render Hourly History
                const historyList = document.getElementById('history-list');
                historyList.innerHTML = '';
                
                data.forEach(record => {
                    const recordTime = new Date(record.timestamp);
                    const diffMins = Math.floor((new Date() - recordTime) / 60000);
                    let timeText = diffMins < 1 ? "Just now" : diffMins < 60 ? `${diffMins} mins ago` : `${Math.floor(diffMins/60)} hrs ago`;
                    const clockTime = recordTime.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

                    let dotColor = record.overall_status === "All Systems Operational" ? "bg-emerald-500" : 
                                   record.overall_status === "Major Outage" ? "bg-red-500" : "bg-amber-500";

                    historyList.innerHTML += `
                        <li class="flex justify-between items-center p-3 rounded-lg border border-slate-100 bg-white shadow-sm">
                            <div class="flex items-center gap-3 w-1/2">
                                <span class="w-2.5 h-2.5 rounded-full ${dotColor} flex-shrink-0"></span>
                                <span class="text-sm font-bold text-slate-700 truncate">${record.overall_status}</span>
                            </div>
                            <div class="flex flex-col text-right w-1/2">
                                <span class="text-slate-600 font-bold text-xs">${timeText}</span>
                                <span class="text-slate-400 text-[10px]">${clockTime}</span>
                            </div>
                        </li>
                    `;
                });

            } catch (error) {
                console.log("History failed to load.", error);
            }
        }

        window.onload = fetchHistory;
    </script>
</body>
</html>
