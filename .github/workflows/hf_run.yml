name: KTU DSpace to Hugging Face Sync

on:
  schedule:
    # Runs automatically every night at 2:00 AM UTC
    - cron: '0 2 * * *' 
  workflow_dispatch: # Allows you to manually click a "Run workflow" button in GitHub

jobs:
  sync-pdfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests huggingface_hub urllib3

      # NOTE: If you want GitHub to automatically find NEW papers before syncing, 
      # remove the '#' from the next two lines to run your harvest script first!
      # - name: Harvest latest papers from JEC
      #   run: python ktu_repo.py harvest

      - name: Sync PDFs to Hugging Face
        env:
          # Pulls your secure token from GitHub Secrets
          HF_TOKEN: ${{ secrets.HF_WRITE_TOKEN }} 
        run: python hf_sync.py
