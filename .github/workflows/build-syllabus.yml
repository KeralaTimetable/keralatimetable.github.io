name: KTU Master Automation (Scrape, Split & Build)

on:
  schedule:
    - cron: '0 0 * * 1' # Runs automatically every Monday at midnight
  workflow_dispatch: # Allows you to click "Run workflow" manually

permissions:
  contents: write

jobs:
  run-everything:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Scraping Dependencies
        run: |
          pip install playwright pymupdf
          playwright install chromium

      - name: 1. Run the KTU Scraper
        run: |
          python scrape_syllabus.py --scheme "B.TECH FULL TIME 2024 SCHEME" --outdir "./raw_pdfs"

      - name: 2. Run the PDF Splitter
        run: |
          # Add your branch splits here based on what downloaded
          if [ -f "./raw_pdfs/Cse.pdf" ]; then
            python split_syllabus.py --pdf ./raw_pdfs/Cse.pdf --branch "Computer Science and Engineering" --scheme "B.Tech Full Time 2024 Scheme" --outdir "."
          fi

      - name: 3. Run the UI Builder
        run: python build_syllabus.py

      - name: 4. Clean up and Format
        run: |
          # Replace old syllabus HTML with the new ones
          rm -rf syllabus
          mv syllabus_out syllabus

      - name: 5. Commit and Push Everything to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the split PDFs, the JSON, and the HTML UI
          git add pdfs/
          git add syllabus_flat.json
          git add syllabus_data.json
          git add syllabus_database.csv
          git add syllabus/
          
          git commit -m "🚀 Auto-Scraped KTU, Split PDFs, and Updated UI" || echo "No changes to commit"
          git push
