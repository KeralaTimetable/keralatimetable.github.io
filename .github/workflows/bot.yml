name: KTU Automated Bots (Status & Notices)

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:    

jobs:
  update-ktu-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Added beautifulsoup4 for the calendar scraper
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright
          python -m playwright install chromium

      - name: Run KTU Server Ping
        run: python ping-server.py

      - name: Run KTU Notice Fetcher
        run: python fetch_notices.py

      # Run your new Academic Calendar scraper
      - name: Run KTU Calendar Scraper
        run: python scraper.py

      # Updated to include calendar-config.js and the downloads/ folder
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add status-history.json notices.json calendar-config.js downloads/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update KTU status, notices & calendars" && git push)
