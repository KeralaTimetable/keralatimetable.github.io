name: KTU Automated Bots (Status & Notices)

on:
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch:    

jobs:
  update-ktu-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright PyPDF2 google-genai pydantic
          python -m playwright install chromium

      - name: Run KTU Server Ping
        run: python ping-server.py

      - name: Run KTU Notice Fetcher
        run: python fetch_notices.py

      - name: Run KTU Calendar Scraper
        run: python scraper.py

      # ADDED: Your new AI-powered timetable bot
      - name: Run KTU Timetable Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python timetables.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use "|| true" so it doesn't crash if a file is missing
          git add status-history.json notices.json || true
          git add calendar-config.js || true
          git add downloads/ || true
          
          # ADDED: Tracking for your timetable PDFs and auto-generated HTML pages
          git add downloads_timetable/ || true
          git add timetable_pages/ || true
          git add timetable-config.js || true
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update KTU status, notices, calendars & timetables" && git push)
