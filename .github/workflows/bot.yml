name: KTU Automated Bots (Status & Notices)

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:    

jobs:
  update-ktu-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Install requests and playwright
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          python -m playwright install chromium

      - name: Run KTU Server Ping
        run: python ping-server.py

      # Run the new Playwright fetcher
      - name: Run KTU Notice Fetcher
        run: python fetch_notices.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add status-history.json notices.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update KTU status and notices" && git push)
