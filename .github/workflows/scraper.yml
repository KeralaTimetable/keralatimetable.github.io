name: KTU Auto-Scraper

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Chrome and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          python -m pip install --upgrade pip
          pip install selenium beautifulsoup4 google-generativeai
          
      - name: Run Headless Browser Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraper.py
        
      - name: Commit and Push New Pages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "KTU AI-Bot"
          git add .
          git diff --staged --quiet || git commit -m "Automated update: AI Generated detailed KTU pages"
          git push
