name: KTU Auto-Scraper

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours automatically
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
          
      - name: Run Scraper Script
        run: python scraper.py
        
      - name: Commit and Push New Pages & Sitemap
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "KTU Auto-Bot"
          git add .
          git diff --staged --quiet || git commit -m "Automated update: Added new KTU pages and refreshed sitemap.xml"
          git push

