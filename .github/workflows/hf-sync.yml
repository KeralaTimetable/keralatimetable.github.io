name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Clean Binary Files for Hugging Face
        run: |
          # Configure a temporary git identity
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Force Git to treat the database as a standard file instead of a blocked binary
          echo "ktu_index.db -binary" > .gitattributes
          git add .gitattributes
          
          # Strip out all heavy static asset folders and images
          git rm -r --cached downloads/ || true
          git rm -r --cached downloads_timetable/ || true
          git rm -r --cached pdfs/ || true
          git rm --cached favicon.png || true
          
          # Commit these changes purely for the Hugging Face mirror
          git commit -m "Optimize file structure for Hugging Face deployment" || true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://KeralaTimetable:$HF_TOKEN@huggingface.co/spaces/KeralaTimetable/ktu-papers-api main
