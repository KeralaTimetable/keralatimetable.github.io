name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Clean Deployment Bundle
        run: |
          # 1. Create a completely empty folder outside the main repo
          mkdir ../deploy_bundle
          
          # 2. Copy ONLY the specific files your Python API needs to run
          cp requirements.txt ../deploy_bundle/
          cp Dockerfile ../deploy_bundle/
          cp ktu_index.db ../deploy_bundle/
          
          # Copy your Python code files
          cp *.py ../deploy_bundle/ || true
          
          # Copy your logo image for the watermark (if it sits in the root)
          cp keralattlogo.png ../deploy_bundle/ || true

          # 3. Move into the clean folder and initialize a brand-new Git setup
          cd ../deploy_bundle
          git init -b main
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # 4. Stage and commit only these essential files
          git add .
          git commit -m "Deploy clean API instance"
          
          # 5. Force push this 100% sterile repository straight to Hugging Face
          git push --force https://KeralaTimetable:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/KeralaTimetable/ktu-papers-api main
