name: KTU Calendar Auto-Scraper

on:
  schedule:
    # Runs daily at 00:00 UTC (around 5:30 AM IST)
    - cron: '0 0 * * *'
  workflow_dispatch: 
    # Creates a "Run workflow" button in the Actions tab for manual testing

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4
          playwright install chromium

      - name: Run KTU Scraper
        # This executes your exact untouched scraper.py file
        run: python scraper.py

      - name: Commit and Push New PDFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update: Downloaded latest KTU Academic Calendars"
          commit_author: "GitHub Actions Bot <actions@github.com>"
          # This action will automatically detect any new PDFs in the downloads/ folder and push them!
