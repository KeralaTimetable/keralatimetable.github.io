name: KTU Calendar Auto-Scraper

on:
  schedule:
    # Runs daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: 
    # Allows you to click "Run workflow" manually from the Actions tab

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4
          playwright install chromium

      - name: Run KTU Scraper
        run: python scraper.py

      - name: Commit and Push New PDFs & Configuration
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update: KTU Academic Calendars Synced"
          commit_author: "GitHub Actions Bot <actions@github.com>"
