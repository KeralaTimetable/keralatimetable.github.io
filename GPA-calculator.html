<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Official KTU SGPA & CGPA Calculator for 2019 & 2024 Schemes. Calculate your engineering grades instantly.">
    <title>KTU Live Calculator | Kerala Timetable</title>
    
    <script src="/tailwind-local.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800;1,900&family=Fira+Code:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            /* Extra padding on mobile to ensure content isn't hidden behind the fixed scoreboard */
            padding-bottom: 220px; 
        }
        @media (min-width: 1024px) {
            body { padding-bottom: 0; }
        }

        /* Authentic Glassmorphism */
        .real-glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 0.95);
            border-left: 1px solid rgba(255, 255, 255, 0.95);
            box-shadow: 0 16px 40px 0 rgba(31, 38, 135, 0.05);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }
        .input-glass:focus-within {
            background: #ffffff;
            border-color: #06b6d4; /* Cyan 500 */
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
        }

        /* Sporty Racing Stripes for Scoreboard */
        .racing-stripes {
            background-image: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 10px,
                rgba(255, 255, 255, 0.03) 10px,
                rgba(255, 255, 255, 0.03) 20px
            );
        }

        /* Orb Animations */
        @keyframes float-pulse {
            0% { transform: scale(1) translate(0, 0); opacity: 0.5; }
            50% { transform: scale(1.05) translate(10px, -10px); opacity: 0.7; }
            100% { transform: scale(1) translate(0, 0); opacity: 0.5; }
        }
        .orb-pulse { animation: float-pulse 8s ease-in-out infinite; }
        
        .font-digits { font-family: 'Fira Code', monospace; }
        
        /* Clean Inputs */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        select { appearance: none; }
        input, select { background: transparent; outline: none; width: 100%; color: #1e293b; font-weight: 700; }
        input::placeholder { color: #94a3b8; font-weight: 600; }
    </style>
</head>

<body class="antialiased w-full relative">

    <div id="navigation-container" class="relative z-50"></div>

    <!-- Background Orbs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-10 -left-10 w-72 h-72 md:w-96 md:h-96">
            <div class="w-full h-full bg-[#39ff14]/40 rounded-full mix-blend-multiply filter blur-[80px] orb-pulse"></div>
        </div>
        <div class="absolute top-[40%] -right-10 w-80 h-80 md:w-[35rem] md:h-[35rem]">
            <div class="w-full h-full bg-cyan-500/30 rounded-full mix-blend-multiply filter blur-[90px] orb-pulse" style="animation-delay: 2s;"></div>
        </div>
    </div>

    <main class="w-full max-w-6xl mx-auto px-4 md:px-6 pt-10 md:pt-16 relative z-10 flex flex-col lg:flex-row gap-8 items-start">
        
        <!-- LEFT COLUMN: Settings & Input Rows -->
        <div class="w-full lg:w-7/12 xl:w-8/12 flex flex-col gap-6">
            
            <!-- Header & Toggles -->
            <div class="text-left flex flex-col md:flex-row md:items-end justify-between gap-4">
                <div>
                    <h1 class="text-3xl md:text-4xl font-black text-slate-800 tracking-tight italic">
                        KTU <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-600 to-lime-500">CALC</span>
                    </h1>
                    <p class="text-sm text-slate-500 font-bold mt-1">Accurate grading engine</p>
                </div>
                
                <div class="flex flex-wrap gap-2">
                    <!-- Mode Toggle -->
                    <div class="flex bg-white/60 p-1 rounded-xl border border-white shadow-sm backdrop-blur-md">
                        <button id="btn-sgpa" onclick="switchMode('SGPA')" class="px-4 py-2 rounded-lg bg-slate-900 text-cyan-400 font-black text-xs uppercase tracking-wider shadow-md transition-all">SGPA</button>
                        <button id="btn-cgpa" onclick="switchMode('CGPA')" class="px-4 py-2 rounded-lg text-slate-500 font-bold text-xs uppercase tracking-wider hover:text-slate-800 transition-all">CGPA</button>
                    </div>
                    <!-- Scheme Toggle -->
                    <div class="flex bg-white/60 p-1 rounded-xl border border-white shadow-sm backdrop-blur-md">
                        <button id="btn-2019" onclick="switchScheme('2019')" class="px-4 py-2 rounded-lg text-slate-500 font-bold text-xs hover:text-slate-800 transition-all">2019</button>
                        <button id="btn-2024" onclick="switchScheme('2024')" class="px-4 py-2 rounded-lg bg-white text-slate-800 font-black text-xs shadow-sm transition-all border border-slate-200">2024</button>
                    </div>
                </div>
            </div>

            <!-- Input Container (Unified Glass Card) -->
            <div class="real-glass rounded-[2rem] p-4 md:p-6 w-full shadow-lg">
                
                <!-- Column Labels -->
                <div id="col-headers" class="grid grid-cols-12 gap-2 px-3 mb-3 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                    <div class="col-span-6 md:col-span-5">Subject</div>
                    <div class="col-span-3 text-center">Credit</div>
                    <div class="col-span-3 md:col-span-3 text-center">Grade</div>
                </div>

                <!-- Rows -->
                <div id="rows-container" class="space-y-3 mb-6">
                    <!-- Injected by JS -->
                </div>

                <!-- Controls -->
                <div class="flex justify-between items-center pt-4 border-t border-slate-200/50">
                    <button onclick="clearAll()" class="text-xs font-bold text-slate-400 hover:text-rose-500 transition-colors px-2 py-2 flex items-center gap-1.5">
                        <i class="fas fa-trash-alt"></i> Reset
                    </button>
                    <button onclick="addRow()" class="px-5 py-2.5 bg-white hover:bg-slate-50 text-slate-800 font-black text-xs rounded-xl shadow-sm border border-slate-200 transition-all flex items-center gap-2">
                        <i class="fas fa-plus text-lime-500"></i> ADD ROW
                    </button>
                </div>
            </div>
            
        </div>

        <!-- RIGHT COLUMN / BOTTOM STICKY: The Scoreboard -->
        <div class="fixed bottom-0 left-0 w-full lg:relative lg:w-5/12 xl:w-4/12 z-40 lg:z-10">
            
            <div class="bg-slate-900 w-full rounded-t-[2.5rem] lg:rounded-[2.5rem] p-6 lg:p-8 shadow-[0_-20px_40px_rgba(0,0,0,0.15)] lg:shadow-2xl relative overflow-hidden border-t lg:border border-slate-700 lg:sticky lg:top-24">
                
                <!-- Background Effects -->
                <div class="absolute inset-0 racing-stripes z-0 opacity-50"></div>
                <div class="absolute -bottom-10 -right-10 w-48 h-48 bg-cyan-500/20 rounded-full filter blur-[60px] z-0"></div>

                <div class="relative z-10 flex flex-col items-center w-full">
                    
                    <!-- Scoreboard Header -->
                    <div class="w-full flex justify-between items-center mb-2">
                        <span id="scheme-indicator" class="text-slate-400 text-[10px] font-bold uppercase tracking-widest border border-slate-700 px-2.5 py-1 rounded-full bg-slate-800/50">
                            2024 Scheme
                        </span>
                        <div class="flex items-center gap-2">
                            <span class="flex h-2.5 w-2.5 relative">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#39ff14] opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-[#39ff14] shadow-[0_0_8px_#39ff14]"></span>
                            </span>
                            <span class="text-[#39ff14] text-[10px] font-black uppercase tracking-widest italic" id="scoreboard-label">LIVE SGPA</span>
                        </div>
                    </div>
                    
                    <!-- Massive Score -->
                    <div class="my-2 lg:my-6">
                        <div class="text-7xl lg:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-br from-white to-slate-300 font-digits italic tracking-tighter drop-shadow-[0_0_20px_rgba(255,255,255,0.1)]" id="final-score">
                            0.00
                        </div>
                    </div>
                    
                    <!-- Speedometer & Stats -->
                    <div class="w-full mt-2">
                        <div class="w-full h-2 bg-slate-800 rounded-full overflow-hidden border border-slate-700 shadow-inner mb-4">
                            <div id="progress-bar" class="h-full bg-gradient-to-r from-cyan-500 to-[#39ff14] rounded-full w-0 transition-all duration-[800ms] ease-out shadow-[0_0_10px_#22d3ee]"></div>
                        </div>
                        
                        <div class="flex justify-between w-full bg-slate-800/60 border border-slate-700/80 rounded-xl p-3 backdrop-blur-sm">
                            <div class="flex flex-col items-start">
                                <span class="text-[9px] text-slate-400 font-black uppercase tracking-widest mb-1">Credits</span>
                                <span id="total-credits" class="text-white font-digits font-bold text-sm">0.0</span>
                            </div>
                            <div class="flex flex-col items-end">
                                <span class="text-[9px] text-slate-400 font-black uppercase tracking-widest mb-1">Status</span>
                                <span id="performance-text" class="text-cyan-400 font-black text-sm italic uppercase">Awaiting</span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </main>

    <script src="components.js"></script>
    <script>
        if(typeof loadNavigation === 'function') loadNavigation('', '/', false);

        let currentMode = 'SGPA'; 
        let currentScheme = '2024'; 
        
        const GRADE_POINTS = {
            'S': 10.0, 'A+': 9.0, 'A': 8.5, 'B+': 8.0, 
            'B': 7.5, 'C+': 7.0, 'C': 6.5, 'D': 6.0, 
            'P': 5.5, 'F': 0.0, 'FE': 0.0, 'I': 0.0
        };

        function switchScheme(scheme) {
            currentScheme = scheme;
            document.getElementById('scheme-indicator').innerText = `${scheme} Scheme`;
            
            const btn2019 = document.getElementById('btn-2019');
            const btn2024 = document.getElementById('btn-2024');

            if(scheme === '2019') {
                btn2019.className = "px-4 py-2 rounded-lg bg-white text-slate-800 font-black text-xs shadow-sm transition-all border border-slate-200";
                btn2024.className = "px-4 py-2 rounded-lg text-slate-500 font-bold text-xs hover:text-slate-800 transition-all";
            } else {
                btn2024.className = "px-4 py-2 rounded-lg bg-white text-slate-800 font-black text-xs shadow-sm transition-all border border-slate-200";
                btn2019.className = "px-4 py-2 rounded-lg text-slate-500 font-bold text-xs hover:text-slate-800 transition-all";
            }
            calculate();
        }

        function switchMode(mode) {
            currentMode = mode;
            
            const btnSgpa = document.getElementById('btn-sgpa');
            const btnCgpa = document.getElementById('btn-cgpa');
            const headers = document.getElementById('col-headers');
            
            if(mode === 'SGPA') {
                btnSgpa.className = "px-4 py-2 rounded-lg bg-slate-900 text-cyan-400 font-black text-xs uppercase tracking-wider shadow-md transition-all";
                btnCgpa.className = "px-4 py-2 rounded-lg text-slate-500 font-bold text-xs uppercase tracking-wider hover:text-slate-800 transition-all bg-transparent";
                headers.innerHTML = `
                    <div class="col-span-6 md:col-span-5">Subject</div>
                    <div class="col-span-3 text-center">Credit</div>
                    <div class="col-span-3 text-center">Grade</div>
                `;
                document.getElementById('scoreboard-label').innerText = "LIVE SGPA";
            } else {
                btnCgpa.className = "px-4 py-2 rounded-lg bg-slate-900 text-cyan-400 font-black text-xs uppercase tracking-wider shadow-md transition-all";
                btnSgpa.className = "px-4 py-2 rounded-lg text-slate-500 font-bold text-xs uppercase tracking-wider hover:text-slate-800 transition-all bg-transparent";
                headers.innerHTML = `
                    <div class="col-span-6 md:col-span-5">Semester</div>
                    <div class="col-span-3 text-center">Credit</div>
                    <div class="col-span-3 text-center">SGPA</div>
                `;
                document.getElementById('scoreboard-label').innerText = "LIVE CGPA";
            }
            clearAll();
        }

        function createRowHTML() {
            if (currentMode === 'SGPA') {
                return `
                    <div class="calc-row grid grid-cols-12 gap-1 md:gap-2 items-center input-glass rounded-xl p-1.5 md:p-2">
                        <div class="col-span-6 md:col-span-5 h-full relative flex items-center">
                            <button onclick="removeRow(this)" class="text-slate-300 hover:text-rose-500 transition-colors px-2 outline-none">
                                <i class="fas fa-minus-circle"></i>
                            </button>
                            <input type="text" placeholder="Sub (Opt)" class="w-full text-xs md:text-sm px-1">
                        </div>
                        <div class="col-span-3 h-full border-l border-slate-200/80">
                            <input type="number" placeholder="0" class="credit-input w-full h-full text-sm md:text-base font-digits text-center" oninput="calculate()">
                        </div>
                        <div class="col-span-3 md:col-span-4 h-full border-l border-slate-200/80">
                            <select class="grade-input w-full h-full text-xs md:text-sm font-black text-center text-cyan-600 cursor-pointer" onchange="calculate()">
                                <option value="" disabled selected>-</option>
                                <option value="S">S</option><option value="A+">A+</option><option value="A">A</option>
                                <option value="B+">B+</option><option value="B">B</option><option value="C+">C+</option>
                                <option value="C">C</option><option value="D">D</option><option value="P">P</option>
                                <option value="F">F</option><option value="FE">FE</option>
                                <option value="MOOC">MOOC (Pass)</option>
                            </select>
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div class="calc-row grid grid-cols-12 gap-1 md:gap-2 items-center input-glass rounded-xl p-1.5 md:p-2">
                        <div class="col-span-6 md:col-span-5 h-full relative flex items-center">
                            <button onclick="removeRow(this)" class="text-slate-300 hover:text-rose-500 transition-colors px-2 outline-none">
                                <i class="fas fa-minus-circle"></i>
                            </button>
                            <input type="text" placeholder="Sem" class="w-full text-xs md:text-sm px-1">
                        </div>
                        <div class="col-span-3 h-full border-l border-slate-200/80">
                            <input type="number" placeholder="0" class="credit-input w-full h-full text-sm md:text-base font-digits text-center" oninput="calculate()">
                        </div>
                        <div class="col-span-3 md:col-span-4 h-full border-l border-slate-200/80">
                            <input type="number" step="0.01" placeholder="0.00" class="sgpa-input w-full h-full text-sm md:text-base font-digits text-center text-cyan-600" oninput="calculate()">
                        </div>
                    </div>
                `;
            }
        }

        function addRow() {
            const container = document.getElementById('rows-container');
            container.insertAdjacentHTML('beforeend', createRowHTML());
        }

        function removeRow(btn) {
            btn.closest('.calc-row').remove();
            calculate();
        }

        function clearAll() {
            const container = document.getElementById('rows-container');
            container.innerHTML = '';
            const limit = currentMode === 'SGPA' ? 8 : 4;
            for(let i=0; i<limit; i++) addRow();
            calculate();
        }

        function calculate() {
            const rows = document.querySelectorAll('.calc-row');
            let totalCredits = 0;
            let totalPoints = 0;
            let hasFailed = false;

            rows.forEach(row => {
                const creditVal = parseFloat(row.querySelector('.credit-input').value);
                
                if(currentMode === 'SGPA') {
                    const gradeVal = row.querySelector('.grade-input').value;
                    
                    // Skip MOOC courses entirely from the math
                    if (gradeVal === 'MOOC') return; 

                    if (!isNaN(creditVal) && creditVal > 0 && GRADE_POINTS[gradeVal] !== undefined) {
                        totalCredits += creditVal;
                        totalPoints += (creditVal * GRADE_POINTS[gradeVal]);
                        if(['F', 'FE', 'I'].includes(gradeVal)) hasFailed = true;
                    }
                } else {
                    const sgpaVal = parseFloat(row.querySelector('.sgpa-input').value);
                    if (!isNaN(creditVal) && creditVal > 0 && !isNaN(sgpaVal) && sgpaVal >= 0) {
                        totalCredits += creditVal;
                        totalPoints += (creditVal * sgpaVal);
                    }
                }
            });

            const scoreDisplay = document.getElementById('final-score');
            const progBar = document.getElementById('progress-bar');
            const perfText = document.getElementById('performance-text');
            const creditDisplay = document.getElementById('total-credits');

            creditDisplay.innerText = totalCredits.toFixed(1);

            if (totalCredits === 0) {
                scoreDisplay.innerText = "0.00";
                progBar.style.width = "0%";
                perfText.innerText = "AWAITING";
                perfText.className = "text-cyan-600 font-black text-sm italic uppercase";
                return;
            }

            let finalGPA = (totalPoints / totalCredits).toFixed(2);
            
            scoreDisplay.innerText = finalGPA;
            progBar.style.width = `${(finalGPA / 10) * 100}%`;

            if (currentMode === 'SGPA' && hasFailed) {
                perfText.innerText = "FAILED";
                perfText.className = "text-rose-500 font-black text-sm italic uppercase";
                progBar.className = "bg-rose-500 h-full rounded-full transition-all duration-700 ease-out shadow-[0_0_10px_#ef4444]";
            } else {
                progBar.className = "bg-gradient-to-r from-cyan-500 to-[#39ff14] h-full rounded-full transition-all duration-700 ease-out shadow-[0_0_10px_#39ff14]";
                
                if (finalGPA >= 9.0) {
                    perfText.innerText = "OUTSTANDING";
                    perfText.className = "text-[#39ff14] font-black text-sm italic uppercase";
                } else if (finalGPA >= 8.0) {
                    perfText.innerText = "EXCELLENT";
                    perfText.className = "text-cyan-400 font-black text-sm italic uppercase";
                } else if (finalGPA >= 7.0) {
                    perfText.innerText = "GOOD";
                    perfText.className = "text-indigo-400 font-black text-sm italic uppercase";
                } else if (finalGPA >= 6.0) {
                    perfText.innerText = "AVERAGE";
                    perfText.className = "text-amber-400 font-black text-sm italic uppercase";
                } else {
                    perfText.innerText = "POOR";
                    perfText.className = "text-orange-500 font-black text-sm italic uppercase";
                }
            }
        }

        window.onload = () => { clearAll(); };
    </script>
</body>
</html>
