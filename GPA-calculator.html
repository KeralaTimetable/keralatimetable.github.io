<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Official KTU SGPA & CGPA Calculator for 2019 & 2024 Schemes. Calculate your engineering grades instantly on this live scoreboard.">
    <title>KTU Live Calculator | Kerala Timetable</title>
    
    <script src="/tailwind-local.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,800;0,900;1,800;1,900&family=Fira+Code:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Lock body scrolling so the app feels native */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; 
            background-color: #f1f5f9;
        }

        /* Authentic Glassmorphism */
        .real-glass {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-top: 1px solid rgba(255, 255, 255, 0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 40px 0 rgba(15, 23, 42, 0.08);
        }

        /* Sporty Racing Stripes for Scoreboard */
        .racing-stripes {
            background-image: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 10px,
                rgba(255, 255, 255, 0.03) 10px,
                rgba(255, 255, 255, 0.03) 20px
            );
        }

        /* Custom Inner Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Orb Animations */
        @keyframes float-pulse {
            0% { transform: scale(1) translate(0, 0); opacity: 0.6; }
            50% { transform: scale(1.05) translate(10px, -10px); opacity: 0.8; }
            100% { transform: scale(1) translate(0, 0); opacity: 0.6; }
        }
        .orb-pulse { animation: float-pulse 8s ease-in-out infinite; }
        
        .font-digits { font-family: 'Fira Code', monospace; }
        
        /* Hide number arrows for clean look */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        select { appearance: none; }
    </style>
</head>

<body class="antialiased h-[100dvh] w-screen flex flex-col relative">

    <div id="navigation-container" class="absolute top-0 w-full z-50"></div>

    <!-- Sporty Background Orbs (Electric Lime & Cyan) -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-10 -left-10 w-72 h-72 md:w-96 md:h-96">
            <div id="mouse-orb-1" class="w-full h-full bg-[#39ff14]/40 rounded-full mix-blend-multiply filter blur-[80px] orb-pulse transition-transform duration-100 ease-out"></div>
        </div>
        <div class="absolute top-[50%] -right-10 w-80 h-80 md:w-[35rem] md:h-[35rem]">
            <div id="mouse-orb-2" class="w-full h-full bg-cyan-500/40 rounded-full mix-blend-multiply filter blur-[90px] orb-pulse transition-transform duration-100 ease-out" style="animation-delay: 2s;"></div>
        </div>
    </div>

    <!-- MAIN APP CONTAINER (Fits perfectly in viewport) -->
    <main class="flex-grow w-full max-w-5xl mx-auto px-2 md:px-6 pt-16 pb-4 md:py-10 flex flex-col justify-center h-full relative z-10">
        
        <div class="w-full h-full max-h-[85vh] md:max-h-[80vh] real-glass rounded-[2rem] md:rounded-[2.5rem] overflow-hidden flex flex-col md:flex-row shadow-2xl border border-white/80">
            
            <!-- LEFT PANE: Scrollable Inputs -->
            <div class="flex-1 flex flex-col p-4 md:p-8 h-[55%] md:h-full relative z-10">
                
                <!-- Sticky Header & Controls -->
                <div class="shrink-0 mb-4 flex flex-col gap-3">
                    <h1 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight italic">
                        KTU <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-600 to-lime-500">CALC</span>
                    </h1>
                    
                    <div class="flex justify-between items-center bg-white/40 p-1.5 rounded-xl border border-white/60 shadow-inner">
                        <!-- Mode Toggle -->
                        <div class="flex gap-1">
                            <button id="btn-sgpa" onclick="switchMode('SGPA')" class="px-3 md:px-5 py-1.5 rounded-lg bg-slate-900 text-cyan-400 font-black text-xs uppercase tracking-wider shadow-md transition-all">SGPA</button>
                            <button id="btn-cgpa" onclick="switchMode('CGPA')" class="px-3 md:px-5 py-1.5 rounded-lg text-slate-500 font-bold text-xs uppercase tracking-wider hover:text-slate-800 transition-all">CGPA</button>
                        </div>
                        
                        <!-- Scheme Toggle -->
                        <div class="flex gap-1 border-l border-slate-300/50 pl-1.5">
                            <button id="btn-2019" onclick="switchScheme('2019')" class="px-2 md:px-4 py-1.5 rounded-lg text-slate-500 font-bold text-xs hover:text-slate-800 transition-all">2019</button>
                            <button id="btn-2024" onclick="switchScheme('2024')" class="px-2 md:px-4 py-1.5 rounded-lg bg-white text-slate-800 font-black text-xs shadow-sm transition-all border border-slate-200">2024</button>
                        </div>
                    </div>

                    <!-- Column Labels -->
                    <div id="col-headers" class="grid grid-cols-12 gap-2 px-3 mt-1 text-[9px] font-black text-slate-400 uppercase tracking-widest">
                        <div class="col-span-5">Subject</div>
                        <div class="col-span-3 text-center">Credit</div>
                        <div class="col-span-3 text-center">Grade</div>
                        <div class="col-span-1"></div>
                    </div>
                </div>

                <!-- Scrollable Rows Container -->
                <div id="rows-container" class="flex-1 overflow-y-auto custom-scrollbar pr-1 md:pr-2 space-y-2 md:space-y-3 pb-4">
                    <!-- Rows injected here -->
                </div>

                <!-- Sticky Footer Add Button -->
                <div class="shrink-0 pt-2 border-t border-slate-200/50 flex justify-between items-center">
                    <button onclick="clearAll()" class="text-xs font-bold text-slate-400 hover:text-rose-500 transition-colors px-2">
                        <i class="fas fa-trash-alt mr-1"></i> Reset
                    </button>
                    <button onclick="addRow()" class="px-5 py-2.5 bg-white/80 hover:bg-white text-slate-800 font-black text-xs rounded-xl shadow-sm border border-slate-200 transition-all flex items-center gap-2">
                        <i class="fas fa-plus text-lime-500"></i> ADD ROW
                    </button>
                </div>
            </div>

            <!-- RIGHT PANE (BOTTOM ON MOBILE): Sporty Live Scoreboard -->
            <div class="h-[45%] md:h-full md:w-[40%] bg-slate-900 shrink-0 p-5 md:p-8 flex flex-col justify-center relative overflow-hidden shadow-[0_-15px_40px_rgba(0,0,0,0.15)] md:shadow-[-15px_0_40px_rgba(0,0,0,0.15)]">
                
                <!-- Dark Mode Racing Stripes -->
                <div class="absolute inset-0 racing-stripes z-0"></div>
                <!-- Glowing corner effect -->
                <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-cyan-500/20 rounded-full filter blur-[70px] z-0"></div>

                <div class="relative z-10 flex flex-col items-center text-center w-full h-full justify-evenly">
                    
                    <div class="w-full flex justify-between items-center">
                        <span id="scheme-indicator" class="text-slate-400 text-[9px] font-bold uppercase tracking-widest border border-slate-700 px-2 py-0.5 rounded-full bg-slate-800/50">2024 Scheme</span>
                        <div class="flex items-center gap-1.5">
                            <span class="flex h-2.5 w-2.5 relative">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#39ff14] opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-[#39ff14] shadow-[0_0_8px_#39ff14]"></span>
                            </span>
                            <span class="text-[#39ff14] text-[9px] font-black uppercase tracking-widest italic" id="scoreboard-label">LIVE SGPA</span>
                        </div>
                    </div>
                    
                    <!-- Massive Digital Score -->
                    <div class="w-full">
                        <div class="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-br from-white to-slate-300 font-digits italic tracking-tighter drop-shadow-[0_0_20px_rgba(255,255,255,0.1)]" id="final-score">
                            0.00
                        </div>
                    </div>
                    
                    <!-- Sporty Speedometer Bar -->
                    <div class="w-full">
                        <div class="w-full h-2.5 md:h-3 bg-slate-800 rounded-full overflow-hidden border border-slate-700 shadow-inner mb-3">
                            <div id="progress-bar" class="h-full bg-gradient-to-r from-cyan-500 to-[#39ff14] rounded-full w-0 transition-all duration-[800ms] ease-out shadow-[0_0_15px_#22d3ee]"></div>
                        </div>
                        
                        <!-- LCD Stats Panel -->
                        <div class="flex justify-between w-full bg-slate-800/60 border border-slate-700/80 rounded-xl p-3 backdrop-blur-sm">
                            <div class="flex flex-col items-start text-left">
                                <span class="text-[8px] md:text-[9px] text-slate-400 font-black uppercase tracking-widest mb-0.5">Total Credits</span>
                                <span id="total-credits" class="text-white font-digits font-bold text-sm md:text-base">0.0</span>
                            </div>
                            <div class="flex flex-col items-end text-right">
                                <span class="text-[8px] md:text-[9px] text-slate-400 font-black uppercase tracking-widest mb-0.5">Status</span>
                                <span id="performance-text" class="text-cyan-400 font-black text-sm md:text-base italic uppercase">Awaiting</span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </main>

    <script src="components.js"></script>
    <script>
        if(typeof loadNavigation === 'function') loadNavigation('', '/', false);

        // --- STATE MANAGEMENT ---
        let currentMode = 'SGPA'; 
        let currentScheme = '2024'; 
        
        // KTU Universal Grade Points (Same for 2019 & 2024)
        const GRADE_POINTS = {
            'S': 10.0, 'A+': 9.0, 'A': 8.5, 'B+': 8.0, 
            'B': 7.5, 'C+': 7.0, 'C': 6.5, 'D': 6.0, 
            'P': 5.5, 'F': 0.0, 'FE': 0.0, 'I': 0.0
        };

        function switchScheme(scheme) {
            currentScheme = scheme;
            document.getElementById('scheme-indicator').innerText = `${scheme} Scheme`;
            
            const btn2019 = document.getElementById('btn-2019');
            const btn2024 = document.getElementById('btn-2024');

            if(scheme === '2019') {
                btn2019.className = "px-2 md:px-4 py-1.5 rounded-lg bg-white text-slate-800 font-black text-xs shadow-sm transition-all border border-slate-200";
                btn2024.className = "px-2 md:px-4 py-1.5 rounded-lg text-slate-500 font-bold text-xs hover:text-slate-800 transition-all";
            } else {
                btn2024.className = "px-2 md:px-4 py-1.5 rounded-lg bg-white text-slate-800 font-black text-xs shadow-sm transition-all border border-slate-200";
                btn2019.className = "px-2 md:px-4 py-1.5 rounded-lg text-slate-500 font-bold text-xs hover:text-slate-800 transition-all";
            }
            calculate();
        }

        function switchMode(mode) {
            currentMode = mode;
            
            const btnSgpa = document.getElementById('btn-sgpa');
            const btnCgpa = document.getElementById('btn-cgpa');
            const headers = document.getElementById('col-headers');
            
            if(mode === 'SGPA') {
                btnSgpa.className = "px-3 md:px-5 py-1.5 rounded-lg bg-slate-900 text-cyan-400 font-black text-xs uppercase tracking-wider shadow-md transition-all";
                btnCgpa.className = "px-3 md:px-5 py-1.5 rounded-lg text-slate-500 font-bold text-xs uppercase tracking-wider hover:text-slate-800 transition-all bg-transparent";
                headers.innerHTML = `
                    <div class="col-span-5">Subject</div>
                    <div class="col-span-3 text-center">Credit</div>
                    <div class="col-span-3 text-center">Grade</div>
                    <div class="col-span-1"></div>
                `;
                document.getElementById('scoreboard-label').innerText = "LIVE SGPA";
            } else {
                btnCgpa.className = "px-3 md:px-5 py-1.5 rounded-lg bg-slate-900 text-cyan-400 font-black text-xs uppercase tracking-wider shadow-md transition-all";
                btnSgpa.className = "px-3 md:px-5 py-1.5 rounded-lg text-slate-500 font-bold text-xs uppercase tracking-wider hover:text-slate-800 transition-all bg-transparent";
                headers.innerHTML = `
                    <div class="col-span-5">Semester</div>
                    <div class="col-span-3 text-center">Credit</div>
                    <div class="col-span-3 text-center">SGPA</div>
                    <div class="col-span-1"></div>
                `;
                document.getElementById('scoreboard-label').innerText = "LIVE CGPA";
            }
            clearAll();
        }

        function createRowHTML() {
            if (currentMode === 'SGPA') {
                return `
                    <div class="calc-row grid grid-cols-12 gap-1.5 md:gap-2 items-center bg-white/60 hover:bg-white border border-white/80 rounded-xl p-1.5 shadow-sm transition-colors">
                        <div class="col-span-5 h-full">
                            <input type="text" placeholder="Sub (Opt)" class="w-full h-full bg-transparent text-xs md:text-sm font-bold text-slate-700 outline-none px-2 py-2">
                        </div>
                        <div class="col-span-3 h-full border-l border-slate-200/60">
                            <input type="number" placeholder="0" class="credit-input w-full h-full bg-transparent text-sm md:text-base font-digits font-black text-center text-slate-700 outline-none py-2" oninput="calculate()">
                        </div>
                        <div class="col-span-3 h-full border-l border-slate-200/60 relative">
                            <select class="grade-input w-full h-full bg-transparent text-sm md:text-base font-black text-center text-cyan-600 outline-none cursor-pointer py-2" onchange="calculate()">
                                <option value="" disabled selected>-</option>
                                <option value="S">S</option><option value="A+">A+</option><option value="A">A</option>
                                <option value="B+">B+</option><option value="B">B</option><option value="C+">C+</option>
                                <option value="C">C</option><option value="D">D</option><option value="P">P</option>
                                <option value="F">F</option><option value="FE">FE</option>
                            </select>
                        </div>
                        <div class="col-span-1 text-center">
                            <button onclick="removeRow(this)" class="text-slate-300 hover:text-rose-500 transition-colors p-1"><i class="fas fa-times-circle"></i></button>
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div class="calc-row grid grid-cols-12 gap-1.5 md:gap-2 items-center bg-white/60 hover:bg-white border border-white/80 rounded-xl p-1.5 shadow-sm transition-colors">
                        <div class="col-span-5 h-full">
                            <input type="text" placeholder="Sem 1" class="w-full h-full bg-transparent text-xs md:text-sm font-bold text-slate-700 outline-none px-2 py-2">
                        </div>
                        <div class="col-span-3 h-full border-l border-slate-200/60">
                            <input type="number" placeholder="0" class="credit-input w-full h-full bg-transparent text-sm md:text-base font-digits font-black text-center text-slate-700 outline-none py-2" oninput="calculate()">
                        </div>
                        <div class="col-span-3 h-full border-l border-slate-200/60">
                            <input type="number" step="0.01" placeholder="0.00" class="sgpa-input w-full h-full bg-transparent text-sm md:text-base font-digits font-black text-center text-cyan-600 outline-none py-2" oninput="calculate()">
                        </div>
                        <div class="col-span-1 text-center">
                            <button onclick="removeRow(this)" class="text-slate-300 hover:text-rose-500 transition-colors p-1"><i class="fas fa-times-circle"></i></button>
                        </div>
                    </div>
                `;
            }
        }

        function addRow() {
            const container = document.getElementById('rows-container');
            container.insertAdjacentHTML('beforeend', createRowHTML());
            // Auto scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        function removeRow(btn) {
            btn.closest('.calc-row').remove();
            calculate();
        }

        function clearAll() {
            const container = document.getElementById('rows-container');
            container.innerHTML = '';
            // Default 6 rows for SGPA, 4 for CGPA
            const limit = currentMode === 'SGPA' ? 6 : 4;
            for(let i=0; i<limit; i++) addRow();
            calculate();
        }

        function calculate() {
            const rows = document.querySelectorAll('.calc-row');
            let totalCredits = 0;
            let totalPoints = 0;
            let hasFailed = false;

            rows.forEach(row => {
                const creditVal = parseFloat(row.querySelector('.credit-input').value);
                
                if(currentMode === 'SGPA') {
                    const gradeVal = row.querySelector('.grade-input').value;
                    if (!isNaN(creditVal) && creditVal > 0 && GRADE_POINTS[gradeVal] !== undefined) {
                        totalCredits += creditVal;
                        totalPoints += (creditVal * GRADE_POINTS[gradeVal]);
                        if(['F', 'FE', 'I'].includes(gradeVal)) hasFailed = true;
                    }
                } else {
                    const sgpaVal = parseFloat(row.querySelector('.sgpa-input').value);
                    if (!isNaN(creditVal) && creditVal > 0 && !isNaN(sgpaVal) && sgpaVal >= 0) {
                        totalCredits += creditVal;
                        totalPoints += (creditVal * sgpaVal);
                    }
                }
            });

            const scoreDisplay = document.getElementById('final-score');
            const progBar = document.getElementById('progress-bar');
            const perfText = document.getElementById('performance-text');
            const creditDisplay = document.getElementById('total-credits');

            creditDisplay.innerText = totalCredits.toFixed(1);

            if (totalCredits === 0) {
                scoreDisplay.innerText = "0.00";
                progBar.style.width = "0%";
                perfText.innerText = "AWAITING";
                perfText.className = "text-cyan-600 font-black text-sm md:text-base italic uppercase";
                return;
            }

            let finalGPA = (totalPoints / totalCredits).toFixed(2);
            
            // Scoreboard UI Updates
            scoreDisplay.innerText = finalGPA;
            progBar.style.width = `${(finalGPA / 10) * 100}%`;

            if (currentMode === 'SGPA' && hasFailed) {
                perfText.innerText = "FAILED";
                perfText.className = "text-rose-500 font-black text-sm md:text-base italic uppercase";
                progBar.className = "bg-rose-500 h-full rounded-full transition-all duration-700 ease-out shadow-[0_0_15px_#ef4444]";
            } else {
                progBar.className = "bg-gradient-to-r from-cyan-500 to-[#39ff14] h-full rounded-full transition-all duration-700 ease-out shadow-[0_0_15px_#39ff14]";
                
                if (finalGPA >= 9.0) {
                    perfText.innerText = "OUTSTANDING";
                    perfText.className = "text-[#39ff14] font-black text-sm md:text-base italic uppercase";
                } else if (finalGPA >= 8.0) {
                    perfText.innerText = "EXCELLENT";
                    perfText.className = "text-cyan-400 font-black text-sm md:text-base italic uppercase";
                } else if (finalGPA >= 7.0) {
                    perfText.innerText = "GOOD";
                    perfText.className = "text-indigo-400 font-black text-sm md:text-base italic uppercase";
                } else if (finalGPA >= 6.0) {
                    perfText.innerText = "AVERAGE";
                    perfText.className = "text-amber-400 font-black text-sm md:text-base italic uppercase";
                } else {
                    perfText.innerText = "POOR";
                    perfText.className = "text-orange-500 font-black text-sm md:text-base italic uppercase";
                }
            }
        }

        // Initialize defaults
        window.onload = () => { clearAll(); };

        // --- MOUSE PARALLAX ENGINE (PC ONLY) ---
        function applyParallax(x, y) {
            const orb1 = document.getElementById('mouse-orb-1');
            const orb2 = document.getElementById('mouse-orb-2');
            
            if(orb1) orb1.style.transform = `translate(${x * -30}px, ${y * -30}px)`;
            if(orb2) orb2.style.transform = `translate(${x * 40}px, ${y * 40}px)`;
        }

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 2; 
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            applyParallax(x, y);
        });
        document.addEventListener('mouseleave', () => applyParallax(0, 0));

        // Note: Gyroscope removed to prevent jitter inside the fixed scroll area on mobile devices.
    </script>
</body>
</html>
